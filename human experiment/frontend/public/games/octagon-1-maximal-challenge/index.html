<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Octagon 1: Maximal Challenge</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1 { color: #fff; font-family: 'Arial', sans-serif; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 24px; }
      .info-text { color: #aaa; font-family: monospace; font-size: 12px; margin-bottom: 5px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1>press enter to begin</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
      </div>
      <div class="info-text">Controls: ARROWS to Rotate, SPACE to Flip, R to Restart</div>
    </div>
    
    <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
      Navigate a high-speed octagonal tunnel. Rotate the tunnel and flip gravity to avoid procedurally generated obstacles and survive for 60 seconds.
    </p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if(window.setControlMode) window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
    </script>
  </body>
</html>

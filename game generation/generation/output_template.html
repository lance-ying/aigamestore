<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{game_title}</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: #111418;
        color: #f5f7fb;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 900px);
      }

      .meta {
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 40px);
      }

      p {
        margin: 0 0 8px;
        line-height: 1.45;
      }

      #game-root {
        display: flex;
        justify-content: center;
      }

      canvas {
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="meta">
        <h1>{game_title}</h1>
        <p>{game_description}</p>
      </section>
      <section id="game-root"></section>
    </main>
{library_script_tags}
  </body>
</html>

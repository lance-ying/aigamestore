# Base configuration for game generation
num_players:
  min: 1
  max: 5

# List of possible game genres
genres:
  - arcade
  - platformer
  - puzzle
  - racing
  - shooter
  - strategy
  - adventure
  - action
  - sports
  - rpg
  - simulation
  - educational

# Additional constraints for game generation
constraints:
  # Browser compatibility
  browser_compatible: true

  # Control schemes
  controls:
    - arrow_keys: # LEFT: 37, UP: 38, RIGHT: 39, DOWN: 40
        left: 37
        up: 38
        right: 39
        down: 40
    - space_bar: 32 # ASCII for space
    - shift_key: 16 # ASCII for shift
    - wasd_keys:
        w: 87
        a: 65
        s: 83
        d: 68
    - mouse_movement: false
    - mouse_clicks: false

  # Game features
  features:
    require_start_screen: true
    require_game_over_screen: true
    require_score_display: true

  # Game code requirements
  requirements:
    allowed_libraries:
      - p5.js: https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js
    audio: false
    ecs: true
    physics: true
    player_movement: true
    score_display: true
    start_end_screen: true

# Templates for code generation
templates:
  html: |
    <!DOCTYPE html>
    <html>
      <head>
        <meta charset="UTF-8" />
        <title>{title}</title>
        <style>
          body {{
            margin: 0;
            padding: 20px 0 0 0;
            overflow: hidden;
            background: #222;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
          }}
          canvas {{
            width: 600px !important;
            height: 400px !important;
            display: block;
          }}
        </style>
      </head>
      <body>
        <!-- Load the p5.js library from CDN -->
        <script src="{p5js_url}"></script>
        <!-- Game code -->
        <script>
          // Ensure p5.js creates a fixed-size canvas
          function setup() {{
            createCanvas(600, 400);
          }}
        </script>
        <!-- Load game code (you may adjust the name of javascript file or include multiple files) -->
        <script src="game.js"></script>
      </body>
    </html>

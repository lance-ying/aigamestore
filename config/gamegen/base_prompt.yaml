# Base configuration for game generation
num_players:
  min: 1
  max: 5

# List of possible game genres
genres:
  - arcade
  - platformer
  - puzzle
  - racing
  - shooter
  - strategy
  - adventure
  - action
  - sports
  - rpg
  - simulation
  - educational

# Additional constraints for game generation
constraints:
  # Browser compatibility
  browser_compatible: true
  
  # Control schemes
  controls:
    - arrow_keys:  # LEFT: 37, UP: 38, RIGHT: 39, DOWN: 40
        left: 37
        up: 38
        right: 39
        down: 40
    - space_bar: 32  # ASCII for space
    - shift_key: 16  # ASCII for shift
    - wasd_keys:
        w: 87
        a: 65
        s: 83
        d: 68
    - mouse_movement: false
    - mouse_clicks: false

  # Game features
  features:
    require_start_screen: true
    require_game_over_screen: true
    require_score_display: true
  
  # Technical constraints
  technical:
    no_audio: true
    allowed_libraries:
      - p5.js
    
  # Game mechanics requirements
  mechanics:
    require_collision_detection: true
    require_player_movement: true
    require_win_condition: true

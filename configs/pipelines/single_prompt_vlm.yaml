name: single_prompt_vlm
requires: [game_folder]
steps:
  - type: evaluator
    name: vlm
    config:
      model: gemini-2.5-flash
      capture_seconds: 30
      resolution: [1280, 720]
  - type: iterator
    name: vlm_feedback
    config:
      max_iters: 2
  - type: evaluator
    name: basic_test
  - type: iterator
    when: failed(basic_test)
    name: basic_bug_fix
    config:
      max_iters: 1



model: anthropic:claude-4.5-sonnet
thinking: false
thinking_budget: 5000
temperature: 1.0
max_tokens: 80000  # Increased for longer, more comprehensive code generation
save_dir: games
method: single_prompt_with_testing
library: three.js
prompt_file: prompts/generation/threejs_instructions.md
libraries_allowed:
  - three.js
  - seedrandom
output_instructions: prompts/output_instructions/single_prompt_with_testing.md
game_controls:
  - ArrowLeft
  - ArrowRight
  - ArrowUp
  - ArrowDown
  - Space
  - Shift
  - Z
  - W
  - A
  - S
  - D
game_phase_control:
  - Enter
  - Escape
  - R
canvas_width: 600
canvas_height: 400

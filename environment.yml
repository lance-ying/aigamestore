name: gordian
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python environment
  - python=3.11

  # Core computation and data science
  - numpy
  - pandas
  - scipy
  - scikit-learn
  
  # Plotting and visualization
  - matplotlib
  - seaborn
  - tqdm

  # Machine Learning / NLP Libraries
  - pytorch
  - transformers
  - datasets
  - sentence-transformers
  - tokenizers
  - safetensors

  # Development and interactive computing
  - ipykernel # For using this environment in Jupyter
  - jupyter_client
  
  # Utilities
  - ffmpeg # Often useful for video/audio processing
  
  # Pip installer
  - pip

  # Python packages to be installed via pip
  - pip:
    - beautifulsoup4
    - playwright
    - langchain
    - langchain-google-genai
    - openai
    - anthropic
    - google-generativeai
    - python-dotenv
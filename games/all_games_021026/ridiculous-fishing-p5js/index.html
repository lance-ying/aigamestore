<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game - p5.js</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1 { color: #fff; font-family: sans-serif; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      p { color: #ccc; font-family: sans-serif; max-width: 600px; margin: 5px auto; line-height: 1.4; font-size: 14px; text-align: center; }
    </style>
    <script>
        window.setControlMode = function(mode) {
            const gameState = window.getGameState();
            if (gameState) {
                gameState.controlMode = mode;
                console.log("Control Mode set to:", mode);
                
                // Update UI
                document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
                if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
                if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
                if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
            }
        };
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle"></h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Basic)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (AI Play)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Cast your line deep, dodging fish on descent. Reel them in on the ascent, then fling and shoot your catch to earn cash. Upgrade your gear to explore greater depths!
      </p>
      <p>Arrow Keys: Move/Aim/Select | Space: Shoot | Z: Buy | Enter: Start/Cast | ESC: Pause</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: sans-serif; }
      
      /* Container styles are handled by JS to ensure iframe compat, but we style the wrapper here */
      #wrapper { position: relative; width: 600px; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      
      h1 { margin: 0 0 10px 0; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      p { color: #ccc; font-size: 14px; margin: 5px 0; text-align: center; max-width: 600px; }
    </style>
  </head>
  <body>
    <div id="wrapper">
        <div style="text-align: center; margin-bottom: 20px;">
          <div class="control-buttons">
            <button id="humanModeBtn" class="control-button active">Human Mode</button>
          </div>
          <!-- Game Description -->
          <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
            Roll your ball on an endless road. Match its color with other balls to collect points, but avoid different colors to prevent crashing. Use ramps to change color and jump.
          </p>
          <p id="gameControls">Controls: Arrow Keys to Move/Speed • ENTER to Start • ESC to Pause</p>
        </div>
        
        <!-- Game container will be appended here by game.js if not found, but we let game.js create it to be safe -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    
    <script type="module" src="game.js"></script>
  </body>
</html>

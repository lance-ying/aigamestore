<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1, p { font-family: 'Courier New', monospace; text-shadow: 1px 1px 0 #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; margin-bottom: 10px;">press enter to begin</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Basic)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        As Kero, clear glitch bugs from C&F Inc.'s server rooms. Jump, shoot, and reboot the teleporter system!
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        ARROWS: Move/Aim | Z: Shoot | SPACE: Jump | SHIFT: Weapon | ENTER: Start | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if(window.setControlMode) window.setControlMode(mode);
        // UI update
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Reset focus to canvas
        setTimeout(() => {
            const canvas = document.querySelector('canvas');
            if(canvas) canvas.focus();
        }, 100);
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

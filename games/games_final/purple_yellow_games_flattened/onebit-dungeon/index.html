<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OneBit Dungeon</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; color: #fff; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: inherit; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #FFD700; color: #000; border-color: #FFD700; }
      h1 { margin-bottom: 5px; text-shadow: 2px 2px 0px #000; }
      #gameDescription { max-width: 600px; text-align: center; color: #aaa; margin-bottom: 15px; font-size: 14px; }
      #gameControls { max-width: 600px; text-align: center; color: #888; margin-bottom: 20px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">OneBit Dungeon</h1>
      <p id="gameDescription">
        Explore procedurally generated dungeons in this turn-based roguelike. 
        Battle monsters, collect gold, and descend as deep as you can. 
        Every move matters - when you move, they move.
      </p>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
      </div>
      <p id="gameControls">
        ARROWS: Move/Attack | SPACE: Wait/Stairs | Z: Potion | ENTER: Start | R: Restart | ESC: Pause
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // Force focus back to body so keys work immediately
          document.body.focus();
        }
      }
    </script>
  </body>
</html>

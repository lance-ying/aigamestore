<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ULTRAKILL-LITE</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: 'Arial', sans-serif; }
      #game-container { 
          position: relative; 
          width: 600px; 
          height: 400px; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5); 
          border: 1px solid #444;
      }
      canvas { display: block; outline: none; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #666; }
      .control-button.active { background: #aa0000; font-weight: bold; }
      h1 { text-transform: uppercase; letter-spacing: 4px; color: #ff0000; text-shadow: 2px 2px 0 #000; margin-top: 0; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">ULTRAKILL-LITE</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">Physics Test</button>
      </div>
      <!-- ADDED GAME CONTROLS -->
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        W, A, S, D: Move Forward, Left, Backward, Right | Arrow Keys: Look / Aim Camera | Space: Jump | Shift: Dash (Directional) | Z: Fire Weapon | ESC: Pause / Unpause | R: Restart (when Game Over) | Enter: Start Game
      </p>
    </div>
    
    <!-- Game Container (Canvas + UI) -->
    <div id="game-container"></div>
    
    <p style="color: #666; font-size: 12px; margin-top: 10px;">
        BLOOD IS FUEL. HELL IS FULL. <br>
        Kill enemies at close range to heal.
    </p>

    <!-- Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- Game Entry -->
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      
      #main-wrapper {
        text-align: center;
        width: 600px;
      }
      
      h1 { color: #ff3333; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 24px; text-shadow: 2px 2px 0px #000; }
      
      #game-container {
        width: 600px;
        height: 400px;
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        border: 2px solid #333;
        margin: 0 auto;
        position: relative;
        background: #000;
      }
      
      .controls-info {
        margin-top: 15px;
        font-size: 12px;
        color: #888;
        background: #222;
        padding: 10px;
        border-radius: 4px;
        text-align: left;
      }
      
      .controls-info span { color: #ccc; font-weight: bold; }
      
      .btn-group { margin-bottom: 10px; }
      button {
        background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; cursor: pointer; font-size: 12px;
        transition: all 0.2s;
      }
      button:hover { background: #555; border-color: #777; }
      button.active { background: #ff3333; border-color: #ff0000; color: #000; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="main-wrapper">
      
      <div class="btn-group">
        <button onclick="window.setControlMode('HUMAN')" class="active">Human Mode</button>
      </div>

      <!-- Game Container -->
      <div id="game-container"></div>
      
      <div class="controls-info">
        <div><span>WASD</span> Move | <span>ARROWS</span> Shoot | <span>Z</span> Switch Weapon</div>
        <div><span>SPACE</span> Dash | <span>ESC</span> Pause | <span>R</span> Restart</div>
        <div>Kill all enemies to progress. Watch your health.</div>
      </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          width: 100%;
          height: 100%;
          overflow: hidden; 
          background: #222; 
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
      }
      #game-container {
          width: 600px; 
          height: 400px; 
          position: relative;
          overflow: hidden;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          flex-shrink: 0;
      }
      canvas { 
          display: block;
      }
      /* UI Overlay handled by canvas inside container */
    </style>
  </head>
  <body>
    <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; text-align: center;">
      Arrow Keys / WASD: Move your character | Space: Jump | Z: Cast Line / Hook / Reel In (Hold during mini-game) | Shift: Sprint | Enter: Start Game | Esc: Pause / Resume | R: Restart Game (from Game Over screen)
    </p>
    
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

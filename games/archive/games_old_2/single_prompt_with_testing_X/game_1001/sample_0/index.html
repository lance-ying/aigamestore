<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fruit Match - Physics Puzzle</title>
    <style>
      html, body { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        overflow: hidden; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      body { 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
      }
      canvas { 
        border: 3px solid #333; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        display: block;
      }
      .control-buttons { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 10px; 
        flex-wrap: wrap; 
        justify-content: center; 
      }
      .control-button { 
        padding: 8px 16px; 
        cursor: pointer; 
        background: #444; 
        color: #fff; 
        border: none; 
        border-radius: 4px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        transition: all 0.3s ease;
      }
      .control-button:hover {
        background: #555;
        transform: translateY(-2px);
      }
      .control-button.active { 
        background: #667eea;
        box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
      }
      h1 {
        color: #fff;
        font-family: 'Arial Black', Arial, sans-serif;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }
      p {
        color: #f0f0f0;
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto 15px auto;
        line-height: 1.6;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">FRUIT MATCH</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Basic Merging)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Win Condition)</button>
      </div>
      <p id="gameDescription">Drop fruits to merge identical ones and create larger fruits. Score points and aim for the watermelon!</p>
      <p id="gameControls"><strong>Controls:</strong> ←/→ Move | SPACE Drop | ESC Pause | ENTER Start | R Restart</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #fff; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 400px !important; height: 500px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1 { color: #fff; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; text-shadow: 2px 2px 0 #000; margin-bottom: 10px; }
      p { color: #ccc; font-family: sans-serif; line-height: 1.4; max-width: 400px; text-align: center; margin: 5px 0; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle"></h1>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">Jump through evolving worlds in this vertical platformer. Bounce off platforms, avoid monsters, and collect stars to ascend higher.</p>
      <p>Jump on platforms to go higher! Avoid monsters and black holes.</p>
      <p>Controls: Arrows to Move, Space to Shoot, ESC to Pause, R to Restart.</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

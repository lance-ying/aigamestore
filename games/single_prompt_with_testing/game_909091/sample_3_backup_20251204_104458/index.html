<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ascent to the Peak</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d4af37; color: #000; font-weight: bold; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Ascent to the Peak</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Test: Basic Jump</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Test: Platform Landing</button>
        <button id="test3ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">Test: Wall Bounce</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Hold SPACE to charge your jump. Release to leap. <br>
        <strong>Warning:</strong> You cannot control your movement in mid-air. Choose your angle wisely.
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
  </body>
</html>

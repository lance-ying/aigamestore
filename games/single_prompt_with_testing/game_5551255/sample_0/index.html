<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tomb of the Neon Mask</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { color: #fff; text-shadow: 0 0 10px #0ff; margin-bottom: 15px; }
      p { color: #aaa; max-width: 600px; text-align: center; margin: 5px 0; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">Tomb of the Neon Mask</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Random)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Smart)</button>
      </div>
      <p>Escape the rising tide! Use Arrow Keys to dash.</p>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Scripts -->
    <script type="module" src="game.js"></script>

    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) window.setControlMode(mode);
        // UI Update
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Return focus to body so keys work immediately
        document.body.focus();
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometric Jumper</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 600px !important;
            height: 400px !important;
            background: #000;
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .control-button {
            padding: 10px 20px;
            cursor: pointer;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .control-button:hover {
            background: #444;
            color: #fff;
        }
        
        .control-button.active {
            background: #ff3c3c;
            color: #fff;
            border-color: #ff3c3c;
            box-shadow: 0 0 10px rgba(255, 60, 60, 0.4);
        }
        
        #gameTitle {
            color: #eee;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #gameDescription {
            color: #aaa;
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        
        #gameControls {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 id="gameTitle">Geometric Jumper</h1>
        
        <div class="control-buttons">
            <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
            <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
            <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (AI)</button>
        </div>
        
        <p id="gameDescription">
            Welcome to Geometric Jumper! Dash through a perilous geometric world. 
            Survive as long as possible by jumping over spikes and pits. 
            The speed increases as you go further!
        </p>
        <p id="gameControls">
            Controls: ENTER to Start | SPACE/UP to Jump | ESC to Pause | R to Restart
        </p>
    </div>

    <!-- P5.js Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <!-- UI Logic -->
    <script>
        function setMode(mode, btn) {
            // Update UI
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Call game global
            if (window.setControlMode) {
                window.setControlMode(mode);
            }
        }
    </script>
</body>
</html>

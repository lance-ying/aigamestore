<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mr. Jump: Polygon Adventure</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1, p { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; margin-bottom: 10px;">Mr. Jump: Polygon Adventure</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Monkey)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Heuristic AI)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 0.9em;">
        Navigate through a vibrant, procedurally generated world filled with treacherous spikes and precarious platforms.
      </p>
      <p id="gameControls" style="color: #aaa; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 0.8em;">
        Controls: Arrows to Move/Jump | Space to Jump | R to Restart | ESC to Pause
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

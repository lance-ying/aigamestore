<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tower Fortress: Ascension</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #444; border-color: #888; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { margin: 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Tower Fortress: Ascension</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Auto Play)</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; color: #aaa;">
        Ascend the procedurally generated tower. Avoid the rising green smoke. Destroy monsters.
      </p>
      <p id="gameControls" style="max-width: 600px; margin: 0 auto 10px auto; font-size: 0.9em; color: #888;">
        Controls: Arrows to Move, SPACE to Jump, Z to Shoot, SHIFT to Dash, ENTER to Start
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
  </body>
</html>

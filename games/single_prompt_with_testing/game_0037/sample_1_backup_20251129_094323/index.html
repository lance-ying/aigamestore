<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Sonic JS Platformer</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
      .control-button.active:hover { background: #0056b3; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Verdana', sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Sonic JS</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Run & Jump)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Ring Scatter)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: 'Verdana', sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 14px;">
        Speed through the zone, collect rings, and defeat robot enemies!
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      function setMode(mode, btn) {
        // Update UI
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Call game function
        if (window.setControlMode) {
          window.setControlMode(mode);
        }
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Velocity Rivals</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 20px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #444; border-color: #888; }
      .control-button.active { background: #e74c3c; border-color: #c0392b; font-weight: bold; }
      h1 { color: #fff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }
      .desc { color: #aaa; margin-bottom: 20px; font-size: 14px; max-width: 600px; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Velocity Rivals</h1>
    <div class="desc">Compete against 3 AI bots. Don't fall off screen. Use Grappling Hook (Shift).</div>
    
    <div class="control-buttons">
      <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
      <button id="test1Btn" class="control-button" onclick="setMode('TEST_1', this)">Test: Move</button>
      <button id="test2Btn" class="control-button" onclick="setMode('TEST_2', this)">Test: Win</button>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) window.setControlMode(mode);
        
        // UI Update
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
    </script>
  </body>
</html>

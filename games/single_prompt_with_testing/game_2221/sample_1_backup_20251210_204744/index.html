<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>WebFishing Sim</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          width: 600px;
          height: 400px;
          overflow: hidden; 
          background: #222; 
      }
      #game-container {
          width: 600px; 
          height: 400px; 
          position: relative;
          overflow: hidden;
      }
      canvas { 
          display: block;
      }
      /* UI Overlay handled by canvas inside container */
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <!-- Testing Control Hook -->
    <script>
        // Default
        window.gameState = { controlMode: "HUMAN" };
    </script>
  </body>
</html>

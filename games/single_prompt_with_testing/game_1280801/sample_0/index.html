<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Flow Connect</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 14px; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
      .desc { max-width: 600px; text-align: center; color: #aaa; margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center;">
      <h1 id="gameTitle">Flow Connect</h1>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Test: Random</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Test: Auto-Win</button>
      </div>

      <p class="desc">
        Connect matching colors with pipes to create a flow. Pair all colors and cover the entire board to solve each puzzle. Pipes will break if they cross or overlap!
      </p>
      
      <div id="canvas-container"></div>
      
      <p class="desc" style="margin-top: 15px; font-size: 12px; color: #666;">
        Controls: Arrows to Move | Space/Z to Draw | R to Restart | ESC to Pause
      </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Garden Defenders: Pixel Patch</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #46cc71; color: #000; font-weight: bold; }
      
      .game-container {
        position: relative;
        text-align: center;
      }
      
      .info-panel {
        color: #ccc; 
        font-family: 'Courier New', monospace; 
        max-width: 600px; 
        margin: 0 auto; 
        text-align: left;
        background: rgba(0,0,0,0.3);
        padding: 10px;
        border-radius: 4px;
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <h1 style="color: #46cc71; font-family: 'Courier New', monospace; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Garden Defenders</h1>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST: Auto-Win</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST: Idle/Lose</button>
        <button id="test3ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST: Physics</button>
      </div>

      <!-- Canvas will be inserted here by p5 -->
      
      <div class="info-panel">
        <p><strong>MISSION:</strong> Defend the garden! Plant flowers to gather sun, shooters to attack, and nuts to block.</p>
        <p><strong>CONTROLS:</strong><br>
        [ARROWS] Move Cursor &nbsp; [SPACE] Plant/Collect Sun<br>
        [Z] Change Plant &nbsp; [SHIFT+SPACE] Shovel Plant<br>
        [ENTER] Start &nbsp; [R] Restart &nbsp; [ESC] Pause</p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // Update UI
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }
    </script>
  </body>
</html>

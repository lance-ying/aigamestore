<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Crimson Keep</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); updateActiveBtn(this);">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); updateActiveBtn(this);">TEST (Move)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); updateActiveBtn(this);">TEST (Survive)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Outrun the devouring Void in this endless dungeon crawler! Hop through traps, avoid monsters, and collect gold.
      </p>
      <p id="gameControls" style="color: #aaa; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        ARROWS: Move | SPACE: Wait | ENTER: Start | ESC: Pause | R: Restart
      </p>
    </div>
    
    <script>
      function updateActiveBtn(clickedBtn) {
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        clickedBtn.classList.add('active');
      }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

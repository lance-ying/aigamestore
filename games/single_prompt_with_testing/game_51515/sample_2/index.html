<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Red Dungeon Escape</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d32f2f; }
      h1 { color: #e53935; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Red Dungeon Escape</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1')">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2')">TEST (Chaos)</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; color: #aaa;">
        Run from the wall of doom! Use Arrow Keys to move. Space to wait.
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode) {
        // Update global state via exposed window function
        const gameState = window.getGameState();
        if (gameState) {
            gameState.controlMode = mode;
            console.log("Control Mode set to:", mode);
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if(mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
            if(mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
        }
      }
      
      // Expose setControlMode for the provided template compatibility if needed
      window.setControlMode = setMode;
    </script>
  </body>
</html>

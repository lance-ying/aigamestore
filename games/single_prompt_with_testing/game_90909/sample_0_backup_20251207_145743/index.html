<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Temple Escape 3D</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure game container is strictly sized */
      #game-container { 
        width: 600px; 
        height: 400px; 
        background: #000;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Temple Escape 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Jump)</button>
        <button id="test2Btn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Turn)</button>
        <button id="test3Btn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST 3 (Slide)</button>
        <button id="test4Btn" class="control-button" onclick="window.setControlMode('TEST_4')">TEST 4 (Die)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Run from the demons! Use Arrows/WASD to Jump, Slide, and Turn.
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

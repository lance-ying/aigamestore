<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Stone Story Legacy</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: inherit; transition: all 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { color: #eee; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
      p { color: #aaa; font-size: 14px; max-width: 600px; text-align: center; margin: 5px 0; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Stone Story Legacy</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Combat)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST 3 (Win)</button>
      </div>
      <p>Collect all Soul Stones to restore the light.</p>
      <p>Arrows: Move/Jump | Z: Attack | Shift: Shield</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Force focus back to body so keys work immediately
        document.body.focus();
      }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Stone Story 3D</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #050505; 
          color: white;
          font-family: monospace;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          width: 600px;
          height: 400px;
          position: relative;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          border: 1px solid #333;
      }
      canvas { 
          display: block;
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 10px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #333; 
          color: #fff; 
          border: 1px solid #555; 
          font-family: monospace;
      }
      .control-button:hover { background: #444; }
      .control-button:active { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Stone Story 3D</h1>
      <div class="control-buttons">
        <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">Test Movement</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">Test Combat</button>
        <button class="control-button" onclick="window.setControlMode('TEST_3')">Test Weapon</button>
        <button class="control-button" onclick="window.setControlMode('TEST_4')">Test Win</button>
      </div>
      <p id="gameDescription">Navigate the darkness. Collect stones. Restore light.</p>
    </div>
    
    <!-- Game container will be created by game.js if not present, but better to be explicit -->
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Underworld Tactics</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: monospace; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: inherit; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; color: #00ccff; text-shadow: 0 0 10px rgba(0, 204, 255, 0.5); }
      .info-text { max-width: 600px; text-align: center; margin-bottom: 15px; font-size: 0.9em; color: #aaa; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">Underworld Tactics</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Speedrun)</button>
      </div>
      <p class="info-text">
        Descend into the procedural depths. Use Arrow Keys to select, SPACE to move/attack, SHIFT+SPACE to Jump.
      </p>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if(window.setControlMode) window.setControlMode(mode);
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
  </body>
</html>

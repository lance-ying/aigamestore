<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Timberman Clone</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Timberman Clone</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="updateMode('TEST_1', this)">TEST (Auto Play)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="updateMode('TEST_2', this)">TEST (Crash)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Chop the tree, avoid branches, and race against time! Use Left/Right arrows to move and chop.
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@1.0.0/p5.collide2d.min.js"></script>
    
    <script>
      function updateMode(mode, btn) {
        // Update Game Mode
        if(window.setControlMode) window.setControlMode(mode);
        
        // Update UI
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Reset focus to canvas logic if needed, or just let click handle it
        document.body.focus();
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

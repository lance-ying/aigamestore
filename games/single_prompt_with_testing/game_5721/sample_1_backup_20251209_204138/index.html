<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Go Escape - P5.js</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #333; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          font-weight: bold;
          transition: all 0.2s;
      }
      .control-button:hover { background: #444; }
      .control-button.active { background: #00bcd4; border-color: #00bcd4; color: #000; }
      
      h1 { color: #00bcd4; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,188,212,0.5); }
      .description { color: #aaa; font-size: 14px; max-width: 600px; text-align: center; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div>
      <h1 id="gameTitle">Go Escape</h1>
      <p class="description">
        Navigate the neon obstacle course. Use Arrow keys to move, Space to Jump.
        Avoid red spikes and don't fall off!
      </p>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN')">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1')">TEST 1 (Physics)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2')">TEST 2 (Smart Bot)</button>
      </div>
    </div>
    
    <!-- Container for p5 canvas is appended by p5 automatically -->
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script type="module" src="game.js"></script>
    
    <script>
      // Global helper to switch modes
      window.setMode = function(mode) {
        const state = window.getGameState();
        if (state) {
            state.controlMode = mode;
            console.log("Control Mode set to:", mode);
            
            // UI Update
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if(mode === 'TEST_1') document.getElementById('test1ModeBtn').classList.add('active');
            if(mode === 'TEST_2') document.getElementById('test2ModeBtn').classList.add('active');
        }
      };
    </script>
  </body>
</html>

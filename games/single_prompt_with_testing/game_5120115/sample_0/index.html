<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Poly Bridge: Structural Engineer</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Poly Bridge: Structural Engineer</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setControlMode('TEST_1')">TEST (Win Strategy)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setControlMode('TEST_2')">TEST (Stress)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Design and build a bridge to help the car cross the canyon. Balance budget and structural integrity.
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        <strong>Controls:</strong> Arrows: Move Cursor | Space: Build/Connect | Shift: Change Material | Z: Delete | Enter: Start/Stop Sim | R: Reset
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if(state) state.controlMode = mode;
        
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        if(mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
        if(mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
      };
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

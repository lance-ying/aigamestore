<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ascent of the King</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Courier New', Courier, monospace; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; font-family: inherit; }
      .control-button:hover { background: #444; }
      .control-button:active { background: #555; }
      h1 { margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 2px; color: #f0c040; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">Ascent of the King</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">Test: Gravity</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">Test: Wall Bounce</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 10px auto; font-size: 0.9em; opacity: 0.8;">
        Climb the tower. Charge jumps with Space. No air control. Good luck.
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

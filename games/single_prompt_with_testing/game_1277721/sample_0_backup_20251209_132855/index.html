<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ZigZag Infinity</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
      .control-button { 
          padding: 10px 20px; 
          cursor: pointer; 
          background: #333; 
          color: #eee; 
          border: 1px solid #555; 
          border-radius: 6px; 
          font-weight: bold;
          transition: all 0.2s ease;
      }
      .control-button:hover { background: #444; }
      .control-button.active { background: #2575fc; border-color: #2575fc; color: #fff; box-shadow: 0 0 10px rgba(37, 117, 252, 0.4); }
      
      h1 { color: #fff; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      p { color: #aaa; max-width: 600px; text-align: center; margin: 5px 0; font-size: 14px; }
      .instructions { color: #888; margin-bottom: 20px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div>
      <h1 id="gameTitle">ZigZag Infinity</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Auto Play (Smart)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Stress Test (Random)</button>
      </div>
      <p>Stay on the wall and do as many zigzags as you can!</p>
      <p class="instructions">Space/Arrows to turn. Don't fall off.</p>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            // Update active button state
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Call game function
            if (window.setControlMode) {
                window.setControlMode(mode);
            }
        }
    </script>
  </body>
</html>

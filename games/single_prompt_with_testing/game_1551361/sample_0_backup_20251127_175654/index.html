<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure container is strict size */
      #game-container { 
          width: 600px; 
          height: 400px; 
          position: relative; 
          overflow: hidden; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; } /* Remove inline-block spacing */
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: Arial, sans-serif; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d35400; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Horizon Drive: Mexico</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); setActive(this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); setActive(this)">TEST (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); setActive(this)">TEST (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Explore the open world, drift through deserts, and collect tokens to expand the festival!
      </p>
    </div>
    
    <!-- Game container is automatically created by JS if not present, but better explicit -->
    <div id="game-container"></div>

    <script>
        function setActive(btn) {
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

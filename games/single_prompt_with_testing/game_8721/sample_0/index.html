<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Super Plumber Run</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #222; 
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      canvas { 
          border: 4px solid #333; 
          border-radius: 4px;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          transition: background 0.2s;
      }
      .control-button:hover { background: #555; }
      .control-button:active { background: #666; }
      
      h1 { color: #fff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
      p { color: #aaa; max-width: 600px; text-align: center; line-height: 1.5; margin: 5px 0; }
      .instructions { font-size: 0.9em; margin-bottom: 20px; color: #888; }
    </style>
  </head>
  <body>
    <div style="text-align: center;">
      <h1>Super Plumber Run</h1>
      
      <div class="control-buttons">
        <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Smart AI)</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Stress)</button>
      </div>

      <p>"Super Plumber Run" is a fast-paced auto-runner platformer.</p>
      <p class="instructions">
          Controls: <strong>SPACE/UP</strong> to Jump, <strong>Z</strong> to Spin, <strong>ENTER</strong> to Start, <strong>R</strong> to Restart.
      </p>
    </div>

    <!-- P5.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

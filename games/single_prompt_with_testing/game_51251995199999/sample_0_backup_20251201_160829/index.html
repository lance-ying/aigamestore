<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tomb of the Mask: P5 Edition</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #0f3460; box-shadow: 0 0 20px rgba(233, 69, 96, 0.2); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #0f3460; }
      .control-button.active { background: #e94560; border-color: #e94560; }
      h1 { margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Tomb of the Mask: P5 Edition</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Bot)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Random)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST 3 (Shield)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Dash through an infinite vertical maze. You cannot stop until you hit a wall. Avoid spikes and the rising neon tide.
      </p>
      <p id="gameControls" style="color: #888; font-size: 12px;">
        Arrows: Dash | Space: Shield (50c) | R: Restart | Esc: Pause
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if(window.setControlMode) window.setControlMode(mode);
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Reset focus to body so keyboard works immediately
            document.body.focus();
        }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

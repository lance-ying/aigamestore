<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Phantom Cat Adventure</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 20px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
      .control-button:hover { background: #444; border-color: #888; }
      .control-button.active { background: #00bcd4; color: #000; border-color: #00bcd4; }
      h1 { color: #00bcd4; text-shadow: 0 0 10px rgba(0,188,212,0.3); margin-bottom: 20px; font-size: 2.5em; }
      .info-text { color: #aaa; max-width: 600px; text-align: center; margin-bottom: 10px; font-size: 0.9em; line-height: 1.4; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Phantom Cat Adventure</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Win Strategy)</button>
      </div>
      <p id="gameDescription" class="info-text">
        Jump across neon platforms, collect Data Shards, and use your Phantom Ice powers to freeze enemies. Reach the portal to win!
      </p>
      <p id="gameControls" class="info-text">
        Controls: Arrows to Move | Space to Jump | Z to Shoot | Shift to Sprint | R to Restart
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    <script>
        function setMode(mode, btn) {
            if(window.setControlMode) {
                window.setControlMode(mode);
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Super Phantom Cat 2 Clone</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #e94560; box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #0f3460; }
      .control-button.active { background: #e94560; border-color: #e94560; box-shadow: 0 0 10px #e94560; }
      h1 { color: #fff; margin-bottom: 10px; text-shadow: 0 0 5px #e94560; }
      p { color: #ccc; max-width: 600px; text-align: center; margin: 5px 0; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Phantom Cat Rescue</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Win Run)</button>
      </div>
      <p>Help Ari rescue Ina! Collect stars and reach the portal.</p>
      <p>Controls: Arrows (Move) | Space (Jump) | Shift (Dash - Needs Powerup) | Enter (Start)</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Legends of Zenonia: The Pixel Return</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1c2c; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; font-weight: bold; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #0099db; }
      h1 { color: #fbb954; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; text-shadow: 2px 2px #000; margin-bottom: 15px; }
      .instructions { color: #aaa; font-family: sans-serif; font-size: 12px; max-width: 600px; text-align: center; margin-top: 10px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1 id="gameTitle">Legends of Zenonia</h1>
    <div class="control-buttons">
      <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); setActive(this);">Human Mode</button>
      <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); setActive(this);">TEST (Movement)</button>
      <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); setActive(this);">TEST (Auto Win)</button>
    </div>
    
    <!-- p5.js and Collide2D -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <div class="instructions">
      <p>Arrows: Move | Space: Attack | Z: Skill (Mp) | Shift: Dash</p>
      <p>Defeat monsters to summon the Dark General. Slay him to win!</p>
    </div>

    <script>
      function setActive(btn) {
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Reset focus to canvas logic if needed, but clicking button usually steals focus
        // User should click canvas to play
      }
    </script>
  </body>
</html>

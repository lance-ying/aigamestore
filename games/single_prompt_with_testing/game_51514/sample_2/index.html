<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Öoo: The Bomb Caterpillar</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      #gameTitle { color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      #gameDescription { color: #ccc; font-family: sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px; }
      #gameControls { color: #888; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Öoo: The Bomb Caterpillar</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateActiveBtn(this); window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="updateActiveBtn(this); window.setControlMode('TEST_1')">TEST (Win Path)</button>
        <button id="test2ModeBtn" class="control-button" onclick="updateActiveBtn(this); window.setControlMode('TEST_2')">TEST (Stress)</button>
      </div>
      <p id="gameDescription">Navigate the mysterious underground, use bombs to clear paths and jump gaps, and find the Golden Leaf!</p>
      <p id="gameControls">Arrows: Move | Space: Jump | Z: Bomb | Esc: Pause | R: Restart</p>
    </div>
    
    <script>
      function updateActiveBtn(btn) {
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

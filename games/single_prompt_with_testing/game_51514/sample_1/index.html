<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Glitch: Gravity Runner</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0f; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #334; box-shadow: 0 0 20px rgba(0, 255, 255, 0.1); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #223; color: #889; border: 1px solid #445; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #334; color: #fff; }
      .control-button.active { background: #007bff; color: #fff; border-color: #0056b3; box-shadow: 0 0 10px rgba(0, 123, 255, 0.5); }
      h1 { text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); letter-spacing: 2px; }
      #gameDescription { background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 8px; border-left: 4px solid #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">NEON GLITCH: GRAVITY RUNNER</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Auto-Play)</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Escape the corrupted mainframe! Use <strong>Arrow Keys</strong> to move, <strong>Space</strong> to Jump, and <strong>Z</strong> to invert Gravity. Collect Data Bits and reach the Blue Portal to survive.
      </p>
      <p id="gameControls" style="color: #aaa; max-width: 600px; margin: 0 auto 10px auto; font-size: 0.9em;">
        Controls: Arrows (Move) | Space (Jump) | Z (Flip Gravity) | Shift (Dash) | R (Restart) | ESC (Pause)
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

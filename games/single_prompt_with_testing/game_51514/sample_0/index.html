<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Core Runner</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      #gameContainer { position: relative; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #0ff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-shadow: 0 0 10px #0ff;">Neon Core Runner</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Pathfinding)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Traverse the corrupted mainframe. Use ARROW keys to move, SPACE to jump, SHIFT to Phase through Cyan walls, and Z to shoot Viruses.
      </p>
    </div>
    
    <div id="gameContainer">
        <!-- Canvas will be injected here by p5 -->
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>

    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
            window.setControlMode(mode);
            // Update UI
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Focus canvas
            setTimeout(() => {
                const cvs = document.querySelector('canvas');
                if(cvs) cvs.focus();
            }, 100);
        }
      }
    </script>
  </body>
</html>

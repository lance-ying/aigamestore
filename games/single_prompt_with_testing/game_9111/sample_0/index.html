<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Square Bird Tower</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Square Bird Tower</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="setControlMode('TEST_1')">TEST (Win)</button>
        <button id="test2Btn" class="control-button" onclick="setControlMode('TEST_2')">TEST (Fail)</button>
        <button id="test3Btn" class="control-button" onclick="setControlMode('TEST_3')">TEST (Fever)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Build your egg tower and pass the barriers! Touch the grass 3 times with perfect landings to reach Fever mode.
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        SPACE: Lay Egg | ENTER: Start | R: Restart
      </p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    
    <script type="module">
      import { gameState } from './globals.js';
      
      window.setControlMode = function(mode) {
        gameState.controlMode = mode;
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        
        if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        else if (mode === 'TEST_1') document.getElementById('test1Btn').classList.add('active');
        else if (mode === 'TEST_2') document.getElementById('test2Btn').classList.add('active');
        else if (mode === 'TEST_3') document.getElementById('test3Btn').classList.add('active');
      };
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

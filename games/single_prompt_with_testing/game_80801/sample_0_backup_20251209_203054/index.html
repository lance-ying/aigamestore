<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Color Roller 3D</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #111; 
          color: #eee;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          border: 2px solid #333;
      }
      canvas { 
          display: block;
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 20px; 
          cursor: pointer; 
          background: #333; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          font-weight: bold;
          transition: all 0.2s;
      }
      .control-button:hover {
          background: #444;
          transform: translateY(-2px);
      }
      .control-button.active { 
          background: #007bff; 
          border-color: #0056b3;
      }
      h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
      .instructions { color: #888; font-size: 0.9em; margin-bottom: 20px; text-align: center; max-width: 600px; }
    </style>
  </head>
  <body>
    <div style="text-align: center;">
      <h1 id="gameTitle">Color Roller 3D</h1>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="updateMode('TEST_1', this)">TEST 1 (Random)</button>
        <button id="test2ModeBtn" class="control-button" onclick="updateMode('TEST_2', this)">TEST 2 (Perfect AI)</button>
      </div>

      <p class="instructions">
          Roll through matching colors! Avoid different colors!<br>
          Use <b>Arrow Keys</b> or <b>A/D</b> to switch lanes.
      </p>
    </div>

    <!-- Game container will be injected here by script if not present, but let's be explicit -->
    <!-- Script handles injection to body, but we want it here in flex flow -->
    <!-- Modifying renderer.js to append to specific ID if exists -->
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function updateMode(mode, btn) {
            // Update game state
            if (window.setControlMode) window.setControlMode(mode);
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Focus game so keys work immediately
            const container = document.getElementById('game-container');
            if(container) container.focus();
        }
    </script>
  </body>
</html>

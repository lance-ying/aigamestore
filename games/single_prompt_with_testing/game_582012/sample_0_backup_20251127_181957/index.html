<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Monster Hunter: Browser Edition</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      
      #game-container {
          width: 600px;
          height: 400px;
          position: relative;
          overflow: hidden;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      
      canvas { display: block; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Monster Hunter: Browser Edition</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST: Move</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST: Attack</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST: Win</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Hunt the Wyvern! Use WASD to move, SPACE to attack, and SHIFT to dodge.
      </p>
    </div>
    
    <div id="game-container">
        <!-- Game Canvas Injected Here -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <script>
      function setMode(mode, btn) {
          if(window.setControlMode) window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

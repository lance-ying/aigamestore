<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Hop</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #3498db; border-color: #2980b9; }
      h1 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px #3498db; margin-top: 0; }
    </style>
    <script>
      function updateActiveButton(mode) {
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        const idMap = { 'HUMAN': 'humanModeBtn', 'TEST_1': 'test1Btn', 'TEST_2': 'test2Btn' };
        if(idMap[mode]) document.getElementById(idMap[mode]).classList.add('active');
      }
      window.setControlModeWrapper = function(mode) {
        if(window.setControlMode) {
            window.setControlMode(mode);
            updateActiveButton(mode);
        }
      }
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Neon Hop</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlModeWrapper('HUMAN')">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="window.setControlModeWrapper('TEST_1')">TEST 1 (Survival Bot)</button>
        <button id="test2Btn" class="control-button" onclick="window.setControlModeWrapper('TEST_2')">TEST 2 (Random Fail)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Bounce to the rhythm! Guide the ball onto the neon tiles. Don't fall into the void.
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        ARROWS: Steer | SPACE: Boost | SHIFT: Slam | ENTER: Start | ESC: Pause | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@1.0.0/p5.collide2d.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

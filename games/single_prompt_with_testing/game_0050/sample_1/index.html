<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PaperConquest</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: Arial, sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">PaperConquest</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Capture)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Conquer territory by drawing loops. Close the loop to capture the area. Don't hit the walls or trails!
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 0.9em;">
        Controls: Arrows to Steer | Space to Boost | ENTER to Start | ESC to Pause | R to Restart
      </p>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    
    <!-- Game Module -->
    <script type="module">
        import { getGameState } from './globals.js';
        
        window.setControlMode = function(mode) {
            const state = getGameState();
            if (state) {
                state.controlMode = mode;
                console.log("Control Mode set to:", mode);
                
                // Update UI
                document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
                if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
                if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
                if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
                
                // Reset if switching modes
                if (state.gamePhase === "PLAYING" || state.gamePhase === "START") {
                    state.gamePhase = "START";
                    if (window.resetGame) window.resetGame(window.gameInstance);
                }
            }
        };
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

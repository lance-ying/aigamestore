<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Dead Pixels</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #b93f3f; border-color: #d15a5a; }
      h1 { color: #d15a5a; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
      p { color: #aaa; font-family: sans-serif; font-size: 14px; max-width: 600px; text-align: center; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Dead Pixels</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Run)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Combat)</button>
      </div>
      <p>Explore, Fight, Roll, Die, Repeat.</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

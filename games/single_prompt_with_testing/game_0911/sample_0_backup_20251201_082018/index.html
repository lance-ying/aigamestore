<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Terraria Lite</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1 { color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-bottom: 5px; text-shadow: 2px 2px 0 #000; }
    </style>
    <script>
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if (state) state.controlMode = mode;
        
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
        if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
      };
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">Terraria Lite</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Win)</button>
      </div>
      <p style="color: #aaa; font-family: monospace; font-size: 12px; max-width: 600px; margin: 0 auto;">
        Press ENTER to Start | Arrows: Move/Aim | Space: Jump | Z: Dig/Atk | Shift: Tool
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Well of Echoes</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px #000; image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #aaa; border: 1px solid #444; border-radius: 2px; transition: all 0.2s; }
      .control-button:hover { background: #444; color: #fff; }
      .control-button.active { background: #0066cc; color: #fff; border-color: #0088ff; }
      h1 { color: #eee; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; text-shadow: 0 0 10px rgba(0,100,255,0.5); }
    </style>
    <script>
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if (state) state.controlMode = mode;
        
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        if (mode === 'TEST_1') document.getElementById('test1Btn').classList.add('active');
        if (mode === 'TEST_2') document.getElementById('test2Btn').classList.add('active');
      };
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Well of Echoes</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Jump Physics)</button>
        <button id="test2Btn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Collect Item)</button>
      </div>
      <p id="gameDescription" style="color: #888; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Explore a bioluminescent labyrinth. Collect the Bubble Wand and Spirit Disc to survive.
      </p>
      <p id="gameControls" style="color: #666; font-size: 12px;">
        ARROWS: Move | SPACE: Jump | Z: Item | SHIFT: Switch Item | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

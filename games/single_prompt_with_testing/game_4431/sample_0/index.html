<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Breach Protocol</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Courier New', monospace; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: inherit; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #0066cc; border-color: #0088ff; }
      h1 { margin: 0 0 10px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
      p { margin: 5px 0; font-size: 14px; color: #aaa; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Breach Protocol</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Random)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Survival)</button>
      </div>
      <p>Defend the Grid. Command the Mechs. Save the Timeline.</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // Update UI
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // Focus canvas
          document.querySelector('canvas')?.focus();
        }
      }
    </script>
  </body>
</html>

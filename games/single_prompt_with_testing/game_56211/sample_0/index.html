<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jetpack Joyride P5</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; outline: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button:active { background: #007bff; }
      .control-button.active { background: #007bff; }
      
      h1, p { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-shadow: 1px 1px 2px black; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; margin-bottom: 10px;">Jetpack Joyride P5</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="updateMode('TEST_1', this)">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="updateMode('TEST_2', this)">TEST (Coins)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4;">
        Escape the secret laboratory! Strap on your high-powered machine-gun jetpack and fly as far as you can. Dodge electrified zappers, evade homing missiles, and collect gold coins to boost your score.
      </p>
      <p id="gameControls" style="color: #aaa; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 0.9em;">
        <strong>Controls:</strong> SPACE/UP to Fly • ESC to Pause • R to Restart • ENTER to Start
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    <script>
      function updateMode(mode, btn) {
        window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Ensure buttons don't keep focus to prevent spacebar triggering click instead of jump
        btn.blur();
      }
    </script>
  </body>
</html>

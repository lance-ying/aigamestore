<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HexaDungeon</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #0f3460; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #16213e; color: #4ecca3; border: 1px solid #4ecca3; border-radius: 4px; transition: all 0.2s; font-family: monospace; font-weight: bold; }
      .control-button:hover { background: #4ecca3; color: #16213e; }
      .control-button.active { background: #4ecca3; color: #16213e; box-shadow: 0 0 10px #4ecca3; }
      h1 { color: #4ecca3; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px rgba(78, 204, 163, 0.5); }
      p { color: #a0a0a0; font-family: sans-serif; font-size: 14px; max-width: 600px; text-align: center; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">HexaDungeon</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Walk)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Win)</button>
      </div>
      <p>Tactical Descent. Move (Space) to attack or reposition. Watch the red danger zones.</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if(window.setControlMode) window.setControlMode(mode);
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
  </body>
</html>

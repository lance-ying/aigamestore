<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Star of Providence: Sector Zero</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: 'Courier New', monospace; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #aaa; border: 1px solid #444; border-radius: 2px; font-family: inherit; transition: all 0.2s; }
      .control-button:hover { background: #444; color: #fff; }
      .control-button.active { background: #007bff; color: #fff; border-color: #0056b3; }
      h1 { color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; margin-bottom: 20px; text-shadow: 0 0 10px #007bff; }
      p { color: #888; font-size: 14px; max-width: 600px; text-align: center; margin: 5px 0; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Star of Providence: Sector Zero</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Win)</button>
      </div>
      <p>Descending in the darkness of a long-abandoned facility.</p>
      <p>Clear sectors, upgrade weapons, and survive.</p>
    </div>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Untitled Goose Clone</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #222; 
          font-family: Arial, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      /* Ensure container is strictly sized */
      #game-container {
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          background: #000;
      }
      canvas { 
          display: block;
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          transition: background 0.2s;
      }
      .control-button:hover { background: #555; }
      .control-button:active { background: #666; }
      h1 { color: #fff; font-size: 24px; margin-bottom: 10px; }
      p { color: #aaa; margin: 5px 0; font-size: 14px; text-align: center; max-width: 600px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1>Untitled Goose Clone</h1>
      <div class="control-buttons">
        <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">Test Movement</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">Test Win</button>
      </div>
      <p>Be a horrible goose. Steal things. Honk at people.</p>
    </div>
    
    <!-- Game container will be injected here by game.js -->
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

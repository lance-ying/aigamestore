<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tiny Gliders</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Tiny Gliders</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); updateActiveBtn(this);">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); updateActiveBtn(this);">TEST (Gravity)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); updateActiveBtn(this);">TEST (Auto Play)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Slide down hills to gain speed, soar into the sky, and race against the setting sun!
      </p>
      <p id="gameControls" style="color: #888; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; font-size: 0.9em;">
        Controls: SPACE/DOWN to Dive, ENTER to Start, R to Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script>window.p5 = p5;</script>
    <script type="module" src="game.js"></script>
    
    <script>
      function updateActiveBtn(clickedBtn) {
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        clickedBtn.classList.add('active');
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Super Meat Boy Forever Clone</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d02020; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #d02020; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Super Meat Boy Forever Clone</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Auto-Win Bot</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Stress Test</button>
        <button id="test3ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">Death Test</button>
      </div>
      <p style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Rescue Nugget from Dr. Fetus! Run, Jump, Wall-Slide and Dash Punch your way to victory.
      </p>
      <p style="color: #888; font-size: 12px;">
        Arrows: Move/Slide | Space: Jump | Z: Dash Punch | Shift: Sprint
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    <script>
      function setMode(mode, btn) {
        if(window.setControlMode) window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Reset focus to canvas if possible, though p5 handles key events globally usually
      }
    </script>
  </body>
</html>

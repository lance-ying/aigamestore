<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tumble Guys</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure container constrains the canvas */
      #game-container { 
          width: 600px; 
          height: 400px; 
          position: relative; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #00CED1; color: #000; font-weight: bold; }
      h1, p { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #eee; margin: 5px 0; text-align: center; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">Tumble Guys</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">Test Movement</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">Test Jump</button>
        <button id="test_7_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_7')">Test AI Run</button>
      </div>
      <p style="font-size: 14px; color: #aaa;">Arrow Keys/WASD to Move | SPACE to Jump | SHIFT to Dive</p>
    </div>
    
    <!-- Game container will be inserted here by game.js if not found, but we can define it -->
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        // Simple UI active state toggler
        const btns = document.querySelectorAll('.control-button');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
  </body>
</html>

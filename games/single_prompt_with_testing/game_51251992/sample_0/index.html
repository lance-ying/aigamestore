<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OneBit Physics Adventure</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Courier New', monospace; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; font-family: inherit; }
      .control-button:hover { background: #555; }
      .control-button:active { background: #666; }
      h1 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; color: #f1c40f; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1 id="gameTitle">OneBit Physics Adventure</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST: Movement</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST: Damage/Death</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST: Combat</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 10px auto; font-size: 14px; color: #aaa;">
        Survive endless dungeons in this physics-based roguelite!
      </p>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script>window.p5 = p5;</script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

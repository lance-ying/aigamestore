<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Platform Panic Protocol</title>
    <style>
      html, body { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        overflow: hidden; 
        background: #111; 
        font-family: 'Courier New', Courier, monospace;
      }
      body { 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
      }
      canvas { 
        border: 4px solid #444; 
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        image-rendering: pixelated;
      }
      .control-buttons { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 10px; 
        flex-wrap: wrap; 
        justify-content: center; 
      }
      .control-button { 
        padding: 8px 16px; 
        cursor: pointer; 
        background: #333; 
        color: #ddd; 
        border: 1px solid #555; 
        border-radius: 4px; 
        font-family: inherit;
        text-transform: uppercase;
        transition: background 0.2s;
      }
      .control-button:hover { background: #444; }
      .control-button.active { background: #ac3232; color: white; border-color: #d95763; }
      
      h1 { color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 0 #ac3232; }
      p { color: #888; font-size: 14px; max-width: 600px; text-align: center; }
    </style>
  </head>
  <body>
    <div>
      <h1 id="gameTitle">PLATFORM PANIC PROTOCOL</h1>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Auto Play)</button>
      </div>
      
      <p id="gameDescription">Procedurally generated infinite runner. Survive, collect data, and escape.</p>
      <p id="gameControls">ARROWS to Move/Jump • SPACE to Jump • Z to Dash</p>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>

    <!-- Game Script -->
    <script type="module" src="game.js"></script>

    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // Update UI
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }
    </script>
  </body>
</html>

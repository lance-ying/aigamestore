<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Bounce Escape</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.2); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #444; border-color: #00ffff; }
      .control-button.active { background: #007bff; border-color: #007bff; }
      h1 { text-shadow: 0 0 10px cyan; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; margin-bottom: 10px;">Neon Bounce Escape</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">TEST (Chaos)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 0.9em;">
        Navigate the neon void! Roll, jump, and bounce to escape. Avoid the red spikes.
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 20px auto; font-size: 0.8em;">
        Controls: Arrows to Move, Space to Jump, Shift to Brake, Enter to Start, R to Restart.
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

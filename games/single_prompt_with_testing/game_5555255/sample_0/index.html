<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Roll: Go Escape 3D</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: sans-serif; }
      #game-container { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #00bcd4; color: #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #00bcd4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;">Neon Roll 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="window.setControlMode('TEST_1')">Test Move</button>
        <button id="test2Btn" class="control-button" onclick="window.setControlMode('TEST_2')">Test Jump</button>
        <button id="test4Btn" class="control-button" onclick="window.setControlMode('TEST_4')">Test Death</button>
        <button id="test5Btn" class="control-button" onclick="window.setControlMode('TEST_5')">Test Win</button>
        <button id="test6Btn" class="control-button" onclick="window.setControlMode('TEST_6')">Test Collect</button>
      </div>
      <p id="gameDescription" style="color: #aaa; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Navigate the neon course. Avoid the void. Reach the cyan portal.
      </p>
      <p id="gameControls" style="color: #fff; font-size: 12px; opacity: 0.8;">
        WASD/Arrows: Move | SPACE: Jump | SHIFT: Brake | ENTER: Start | ESC: Pause | R: Restart
      </p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

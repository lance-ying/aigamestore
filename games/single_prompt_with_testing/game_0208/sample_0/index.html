<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Risk of Rain - Action Platformer Roguelike</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Arial', sans-serif;
      }
      
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      
      canvas {
        border: 2px solid #333;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        width: 600px !important;
        height: 400px !important;
      }
      
      .header-container {
        text-align: center;
        margin-bottom: 15px;
        width: 600px;
      }
      
      h1 {
        color: #64ffaa;
        font-size: 28px;
        margin-bottom: 8px;
        text-shadow: 0 0 10px rgba(100, 255, 170, 0.5);
      }
      
      .control-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .control-button {
        padding: 8px 16px;
        cursor: pointer;
        background: #2a2a3a;
        color: #fff;
        border: 1px solid #444;
        border-radius: 4px;
        font-size: 13px;
        transition: all 0.3s;
      }
      
      .control-button:hover {
        background: #3a3a4a;
        border-color: #64ffaa;
      }
      
      .control-button.active {
        background: #64ffaa;
        color: #0a0a0a;
        border-color: #64ffaa;
        font-weight: bold;
      }
      
      p {
        color: #ccc;
        font-size: 13px;
        line-height: 1.4;
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <div class="header-container">
      <h1>RISK OF RAIN - Action Platformer Roguelike</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST_1 (Basic Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST_2 (Win Strategy)</button>
      </div>
      <p>Survive on a hostile alien planet! Collect items, defeat enemies, activate the teleporter, and defeat the boss to escape.</p>
      <p><strong>Controls:</strong> Arrow Keys: Move/Jump | Space: Shoot | Z: Dash | Enter: Start | ESC: Pause | R: Restart</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script type="module" src="game.js"></script>
    <script type="module" src="automated_testing_controller.js"></script>
  </body>
</html>

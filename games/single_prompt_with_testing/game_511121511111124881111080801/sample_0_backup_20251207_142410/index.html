<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cavern Tale</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; font-family: inherit; font-size: 14px; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #d32f2f; border-color: #f44336; }
      
      h1 { color: #eee; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; }
      p { color: #aaa; max-width: 600px; text-align: center; font-size: 14px; line-height: 1.5; margin: 5px 0; }
      .controls-hint { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1>CAVERN TALE</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="setMode('TEST_1', this)">Test: Movement</button>
        <button id="test2Btn" class="control-button" onclick="setMode('TEST_2', this)">Test: Shooting</button>
        <button id="test3Btn" class="control-button" onclick="setMode('TEST_3', this)">Test: Damage</button>
        <button id="test4Btn" class="control-button" onclick="setMode('TEST_4', this)">Test: Death</button>
        <button id="test5Btn" class="control-button" onclick="setMode('TEST_5', this)">Test: Win</button>
      </div>
      <p>Explore the cave, blast enemies, and level up your weapon!</p>
    </div>

    <!-- Container for p5 canvas -->
    <main id="game-container"></main>

    <p class="controls-hint">
        ARROWS: Move/Aim | Z: Shoot | SPACE: Jump | SHIFT: Strafe | ESC: Pause
    </p>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Scripts -->
    <script type="module" src="game.js"></script>

    <script>
        function setMode(mode, btn) {
            window.setControlMode(mode);
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Focus canvas
            setTimeout(() => window.gameInstance.canvas.focus(), 100);
        }
    </script>
  </body>
</html>

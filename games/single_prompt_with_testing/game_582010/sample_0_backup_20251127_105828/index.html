<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Monster Hunter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 600px;
        height: 400px;
        overflow: hidden;
        margin: 0;
        padding: 0;
        background: #222;
      }
      
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      
      #game-container {
        width: 600px;
        height: 400px;
        position: relative;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }
      
      canvas {
        display: block;
        margin: 0;
        padding: 0;
      }
      
      .control-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .control-button {
        padding: 8px 16px;
        cursor: pointer;
        background: #444;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-family: Arial, sans-serif;
      }
      
      .control-button.active {
        background: #ff6b35;
      }
      
      .control-button:hover {
        background: #555;
      }
      
      .control-button.active:hover {
        background: #ff8555;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

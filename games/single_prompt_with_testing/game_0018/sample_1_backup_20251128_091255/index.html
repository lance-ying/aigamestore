<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #gameContainer { position: relative; width: 600px; height: 400px; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; }
      .control-buttons { 
        position: absolute; 
        top: 0; 
        left: 0; 
        right: 0; 
        display: flex; 
        gap: 10px; 
        padding: 10px; 
        flex-wrap: wrap; 
        justify-content: center;
        z-index: 1000;
        pointer-events: none;
      }
      .control-button { 
        padding: 8px 16px; 
        cursor: pointer; 
        background: #444; 
        color: #fff; 
        border: none; 
        border-radius: 4px;
        pointer-events: auto;
        font-size: 12px;
      }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Basic Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (AI Play)</button>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

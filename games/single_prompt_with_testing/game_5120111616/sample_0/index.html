<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Poly Bridge 3D</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #game-container { position: relative; width: 600px; height: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      canvas { width: 100% !important; height: 100% !important; display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Poly Bridge 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1')">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2')">TEST 2 (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Build a bridge to help the vehicle cross the gap. Manage budget and stress!
      </p>
    </div>
    
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <script>
      function setMode(mode) {
        if(window.getGameState) {
          window.getGameState().controlMode = mode;
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
          if(mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
          if(mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
        }
      }
      window.setControlMode = setMode;
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Team Fortress 2 Demake</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #222;
          font-family: Arial, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          position: relative;
          width: 600px;
          height: 400px;
          border: 4px solid #333;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 10px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: none; 
          border-radius: 4px; 
          font-weight: bold;
      }
      .control-button:hover { background: #555; }
      .control-button.active { background: #B8383B; }
      
      h1 { color: #fff; margin-bottom: 10px; text-shadow: 2px 2px #000; }
      p { color: #ccc; max-width: 600px; line-height: 1.4; margin-bottom: 5px; font-size: 14px; }
      .instructions { margin-bottom: 20px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="instructions">
      <h1>TF2 Demake: Capture the Point</h1>
      <div class="control-buttons">
        <button class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Move)</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Shoot)</button>
      </div>
      <p>Capture the central control point! Defeat the Blue team.</p>
      <p>Controls: WASD to Move, Arrows to Look, Space to Jump, Z to Shoot.</p>
    </div>
    
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Slay-In-Finite</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #444; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
    <script>
      // Global function to set control mode for testing
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if (state) {
          state.controlMode = mode;
          console.log("Control Mode set to:", mode);
          
          // Update button styles
          document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
          const btnId = mode === 'HUMAN' ? 'humanModeBtn' : (mode === 'TEST_1' ? 'test1ModeBtn' : 'test2ModeBtn');
          document.getElementById(btnId)?.classList.add('active');
          
          // Focus canvas
          document.querySelector('canvas')?.focus();
        }
      };
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Slay-In-Finite</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Movement)</button>
        <button id="test2ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Combat)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: 'Courier New', monospace; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Endless Action RPG. Slay monsters, collect loot, level up.
      </p>
      <p id="gameControls" style="color: #888; font-family: 'Courier New', monospace; font-size: 12px;">
        ARROWS: Move | Z: Attack | SPACE: Jump | SHIFT: Dash
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

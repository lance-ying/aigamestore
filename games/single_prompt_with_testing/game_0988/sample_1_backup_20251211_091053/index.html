<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Twist 3D</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure game container is strictly sized */
      #game-container { 
          width: 600px; 
          height: 400px; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5); 
          position: relative;
      }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Twist 3D</h1>
      <div class="control-buttons">
        <button class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">Test Move</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">Test Jump</button>
        <button class="control-button" onclick="window.setControlMode('TEST_3')">Test Turn</button>
      </div>
    </div>
    <!-- Game scripts -->
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

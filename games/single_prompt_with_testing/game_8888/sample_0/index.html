<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cookie Kingdom Defense</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #5D4037; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      #gameTitle { color: #F48FB1; text-shadow: 2px 2px #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; margin-bottom: 10px;">Cookie Kingdom Defense</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Combat)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST (Collector)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Run, Jump, and Fight! Help the Gingerbread Hero defend Earthbread from the Cake Monsters.
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        ARROWS: Move | SPACE: Jump | Z: Attack | SHIFT: Dash
      </p>
    </div>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // If game is not playing, try to start it for tests
        const gs = window.getGameState();
        if (gs && gs.gamePhase === "START" && mode !== "HUMAN") {
            // Auto start for tests
            window.dispatchEvent(new KeyboardEvent('keydown', {'keyCode': 13}));
        }
      }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

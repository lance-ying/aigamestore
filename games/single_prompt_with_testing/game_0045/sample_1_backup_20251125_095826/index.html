<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neon White - Speedrun FPS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #0a0a15;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #game-container {
      width: 600px;
      height: 400px;
      position: relative;
      overflow: hidden;
      margin: 0;
      padding: 0;
      border: 2px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    
    canvas {
      display: block;
      margin: 0;
      padding: 0;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
</head>
<body>
  <script type="module" src="game.js"></script>
</body>
</html>

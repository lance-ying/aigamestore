<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neon White - Speedrun FPS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #0a0a15;
      font-family: Arial, sans-serif;
      color: #ffffff;
    }
    
    #main-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 15px;
    }
    
    #game-info {
      width: 600px;
      padding: 10px 15px;
      background: rgba(10, 10, 21, 0.9);
      border: 2px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      border-radius: 5px;
    }
    
    #game-info h1 {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-bottom: 5px;
      font-size: 18px;
    }
    
    #game-info h2 {
      color: #ff0066;
      margin-top: 8px;
      margin-bottom: 4px;
      font-size: 14px;
    }
    
    #game-info p {
      color: #aaaaaa;
      line-height: 1.3;
      margin-bottom: 2px;
      font-size: 11px;
    }
    
    #game-info .control-item {
      color: #ffffff;
      margin-left: 10px;
      font-size: 11px;
      line-height: 1.3;
    }
    
    #game-info .highlight {
      color: #ffff00;
      font-weight: bold;
    }
    
    #game-container {
      width: 600px;
      height: 400px;
      position: relative;
      overflow: hidden;
      margin: 0;
      padding: 0;
      border: 2px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    
    canvas {
      display: block;
      margin: 0;
      padding: 0;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
</head>
<body>
  <div id="main-container">
    <div id="game-info">
      <h1>🎮 NEON WHITE - Speedrun FPS</h1>
      <p><span class="highlight">OBJECTIVE:</span> Eliminate all demons as fast as possible!</p>
      
      <h2>🎯 CONTROLS</h2>
      <p class="control-item"><span class="highlight">WASD:</span> Move | <span class="highlight">Arrows:</span> Look | <span class="highlight">SPACE:</span> Jump | <span class="highlight">SHIFT:</span> Dash | <span class="highlight">Z:</span> Shoot</p>
      <p class="control-item"><span class="highlight">ENTER:</span> Start | <span class="highlight">ESC:</span> Pause | <span class="highlight">R:</span> Restart</p>
      
      <h2>💡 STRATEGY</h2>
      <p>• Collect <span class="highlight">Soul Cards</span> for weapons/abilities • Chain abilities for max speed</p>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>

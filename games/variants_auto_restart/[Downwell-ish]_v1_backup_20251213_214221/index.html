<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #FF0044; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Descend a monster-filled well using Gunboots to shoot enemies, slow your fall, and collect gems. Ammo recharges on landing. Reach the bottom alive!
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Arrow Left / Right: Move | Space: Jump (ground) / Shoot Gunboots (air) | Enter: Start Game | R: Restart Game | Esc: Pause / Unpause
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <!-- p5.collide2d is imported as module in physics.js but we can include fallback if needed, though module import handles it -->
    
    <script type="module" src="game.js"></script>
    
  </body>
</html>

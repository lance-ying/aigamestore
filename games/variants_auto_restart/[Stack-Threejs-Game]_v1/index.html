<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Three.js Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure container has exact size and clips overflow */
      #game-container { 
        width: 600px; 
        height: 400px; 
        position: relative; 
        overflow: hidden; 
        background: #000;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      /* Removed control-buttons and related styles as they are no longer needed */
      
      /* UI Text styling helper */
      .game-text {
          font-family: 'Arial', sans-serif;
          color: #fff;
          margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <!-- Removed h1#gameTitle as per feedback -->
      <!-- Removed control-buttons div entirely as there is only one mode and no mode selection is needed -->
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Build the tallest tower by precisely stacking blocks. Overhangs are sliced off, making the target smaller. Miss too many, and it's game over!
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        SPACE: Place Block | ENTER: Start Game | ESC: Pause/Unpause | R: Restart Game
      </p>
    </div>
    
    <!-- Game Container acts as the boundary for the game canvas and UI -->
    <div id="game-container"></div>
    
    <!-- Removed setMode script as it is no longer needed -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Hop</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      
      /* Important: Container size constraints */
      #game-container { 
          width: 480px; 
          height: 400px; 
          box-shadow: 0 0 20px rgba(0,255,255,0.2);
          position: relative;
      }
      
      canvas { display: block; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      
      h1, p { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; color: #eee; margin: 5px 0; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 15px;">
      <h1 id="gameTitle">Neon Hop</h1>
      
      <p id="gameDescription" style="font-size: 14px; max-width: 600px; color: #aaa;">
        Bounce along the neon path. Steer Left/Right. Don't fall into the void.
      </p>

      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Arrow Left / A: Steer Left | Arrow Right / D: Steer Right | Space: Boost Jump (Mid-air only) | Enter: Start Game | R: Restart Game | Esc: Pause/Resume
      </p>
    </div>
    
    <!-- Game Container created by JS, but placeholder here for structure logic if needed -->
    <!-- The script will append it to body or find it -->
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

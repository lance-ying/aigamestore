<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Logic Is You</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-shadow: 2px 2px #000;">LOGIC IS YOU</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
      </div>
      <p id="gameDescription" style="color: #aaa; font-family: monospace; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Rules are blocks. Change the rules to win.
      </p>
      <!-- Game Controls -->
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Arrow Keys: Move your character (the object defined as "YOU") and push blocks. | Z: Undo the last move. | R: Restart the current level. | Space: Skip to next level (debug/cheat). | ESC: Pause the game. | Enter: Start game from title screen.
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module">
        import { gameState } from './globals.js';
        
        import './game.js';
        
        window.setControlMode = function(mode) {
            gameState.controlMode = mode;
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        };
    </script>
  </body>
</html>

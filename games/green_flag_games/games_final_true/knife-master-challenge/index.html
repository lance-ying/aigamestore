<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e1e24; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 10px 20px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #e63946; }
      
      h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
      .desc { max-width: 600px; text-align: center; color: #aaa; margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
      .controls { background: #2b2d42; padding: 15px; border-radius: 8px; font-size: 13px; color: #ccc; margin-top: 20px; }
    </style>
  </head>
  <body>
    <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Master precision in Knife Master Challenge! Throw knives into rotating logs, avoid existing knives and obstacles, slice apples for bonuses, and defeat bosses.
    </p>
    <!-- The p5.js canvas will be appended here by the game.js script -->
    
    <div class="controls">
        <strong>Controls:</strong> SPACE/Z: Throw &bull; ENTER: Start &bull; ESC: Pause &bull; R: Restart
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
    
  </body>
</html>

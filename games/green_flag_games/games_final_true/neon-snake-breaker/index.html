<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Snake Breaker</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 20px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; font-size: 14px; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; color: #ffdc32; }
      p { max-width: 600px; text-align: center; margin: 5px 0; color: #aaa; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Neon Snake Breaker</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="updateMode('TEST_1', this)">TEST: Survival AI</button>
        <button id="test2ModeBtn" class="control-button" onclick="updateMode('TEST_2', this)">TEST: Suicide AI</button>
        <button id="test3ModeBtn" class="control-button" onclick="updateMode('TEST_3', this)">TEST: Fever AI</button>
      </div>
      <p id="gameDescription">Guide your snake of balls through a neon corridor. Break numbered blocks to progress, losing length equal to the block's value. Collect balls to grow and use Fever for an invincible dash.</p>
      <p id="gameControls">Controls: Left/Right to Move | Shift to Dash | Z for Fever | ESC Pause | R Restart</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function updateMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                // Update UI
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Force focus back to body so keys work immediately
                document.body.focus();
            }
        }
    </script>
  </body>
</html>

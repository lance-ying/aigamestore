<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a050f; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #b81420; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(180, 20, 30, 0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #2a1a1f; color: #fff; border: 2px solid #5a3a3f; border-radius: 4px; font-family: Arial, sans-serif; transition: all 0.3s; }
      .control-button:hover { background: #3a2a2f; border-color: #7a5a5f; }
      .control-button.active { background: #b81420; border-color: #d81430; }
      h1 { color: #b81420; font-family: 'Arial Black', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-bottom: 10px; }
      p { color: #ccc; font-family: Arial, sans-serif; line-height: 1.4; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="font-size: 36px; margin-bottom: 10px;">CARRION - Reverse Horror</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST_1 (Basic Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST_2 (Win Strategy)</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 15px auto;">
        You are an amorphous creature, trapped in a facility. Consume humans to grow, evolve abilities, and eliminate all personnel to escape.
      </p>
      <p id="gameControls" style="max-width: 600px; margin: 0 auto 20px auto; font-size: 13px;">
        <strong>Arrow Keys:</strong> Move | <strong>Space:</strong> Lunge Attack | <strong>Shift:</strong> Tentacles (Large) | <strong>Z:</strong> Blood Trail (Medium+) | <strong>Enter:</strong> Start | <strong>ESC:</strong> Pause | <strong>R:</strong> Restart
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

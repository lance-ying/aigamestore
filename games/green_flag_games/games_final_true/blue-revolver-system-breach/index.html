<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #050510; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #00FFFF; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #112; color: #0FF; border: 1px solid #0FF; border-radius: 4px; font-family: 'Courier New', monospace; transition: all 0.2s; }
      .control-button:hover, .control-button.active { background: #0FF; color: #000; box-shadow: 0 0 10px #0FF; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">HUMAN PILOT</button>
      </div>
      <!-- Game Description -->
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        BLUE REVOLVER: SYSTEM_BREACH is a high-speed vertical shoot-em-up. Pilot Mae's avatar to breach the Blue Revolver mainframe, survive security, and destroy core systems.
      </p>
      <p id="gameControls" style="color: #666; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        ARROWS: Move | SPACE: Shoot | SHIFT: Focus | Z: Special | ENTER: Start
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    <script>
        // UI helper to toggle active class
        const buttons = document.querySelectorAll('.control-button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                buttons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
  </body>
</html>

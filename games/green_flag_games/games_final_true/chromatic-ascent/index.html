<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Chromatic Ascent</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a24; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
      .control-button { padding: 8px 20px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button:active { background: #555; }
      .info-container { text-align: center; max-width: 600px; margin-bottom: 15px; }
      h1 { margin: 0 0 10px 0; letter-spacing: 2px; text-transform: uppercase; font-size: 24px; color: #00FFFF; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
      p { margin: 5px 0; font-size: 14px; color: #ccc; }
    </style>
  </head>
  <body>
    <div class="info-container">
      <h1 id="gameTitle">Chromatic Ascent</h1>
      <p id="gameDescription">Guide your bouncing orb through rotating puzzles. Match its color to pass obstacles; touching a different color is fatal. Collect stars and Color Changers as you climb.</p>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Hover)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Climb)</button>
      </div>
      
      <p id="gameControls">SPACE: Jump | ARROWS: Move | ESC: Pause | R: Restart</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

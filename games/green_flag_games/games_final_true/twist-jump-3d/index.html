<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        overflow: hidden; 
        background: #111; 
        color: #fff;
        font-family: Arial, sans-serif;
      }
      body { 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
      }
      #game-container {
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      }
      .control-buttons { 
        display: flex; 
        gap: 10px; 
        margin-bottom: 10px; 
        flex-wrap: wrap; 
        justify-content: center; 
      }
      .control-button { 
        padding: 8px 16px; 
        cursor: pointer; 
        background: #444; 
        color: #fff; 
        border: none; 
        border-radius: 4px; 
        transition: background 0.2s;
      }
      .control-button:hover {
        background: #555;
      }
      .control-button.active { 
        background: #007bff; 
      }
      h1 { margin-bottom: 10px; }
      p { max-width: 600px; text-align: center; color: #aaa; font-size: 14px; margin-bottom: 5px;}
    </style>
  </head>
  <body>
    
    <div class="control-buttons">
      <button id="humanModeBtn" class="control-button active">Human Mode</button>
    </div>

    <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
      Twist Jump 3D: Control a ball rolling on a twisting path. Rotate the world to align platforms, jump gaps, and collect gems. Survive as speed increases!
    </p>

    <p>Use Left/Right Arrows to Rotate. Space to Jump.</p>
    
    <!-- Game container will be injected here by game.js -->
    
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

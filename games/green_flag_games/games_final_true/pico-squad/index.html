<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pico Squad</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      .instructions { color: #888; font-family: sans-serif; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Arial', sans-serif; margin-bottom: 10px; letter-spacing: 2px;">PICO SQUAD</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setControlMode('TEST_1')">TEST 1 (Solver)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setControlMode('TEST_2')">TEST 2 (Physics)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Pico Squad: A puzzle-platformer where you control three characters simultaneously.
        Collect the key and guide all squad members to the exit.
        Coordinate movement, stack, and push blocks to overcome obstacles; lose one, lose all!
      </p>
    </div>
    
    <!-- Game Container -->
    <div id="game-container"></div>
    
    <div class="instructions">Arrows: Move • Space: Jump • Z: Switch Agent • X: Regroup</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script type="module">
        import { gameState, resetFullGame } from './globals.js';
        
        window.setControlMode = function(mode) {
            gameState.controlMode = mode;
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if(mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
            if(mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
            
            // Reset game for clean test
            resetFullGame();
            
            // Focus canvas
            window.focus();
        };
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

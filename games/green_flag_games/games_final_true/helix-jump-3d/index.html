<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Helix Jump 3D</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #222; 
          font-family: Arial, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: none; 
          border-radius: 4px; 
          font-size: 14px;
          transition: background 0.2s;
      }
      .control-button:hover {
          background: #555;
      }
      .control-button.active { 
          background: #007bff; 
      }
      h1 { margin-top: 0; color: #fff; font-size: 24px; margin-bottom: 10px; }
      p { color: #ccc; margin: 5px 0; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Helix Jump 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Physics)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (AI Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Guide a bouncing ball down a rotating helical tower by navigating gaps. Avoid red zones to reach the bottom and set a high score.
      </p>
      <p>Arrow Left/Right to Rotate | ENTER to Start | ESC to Pause</p>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                // Update UI
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
  </body>
</html>

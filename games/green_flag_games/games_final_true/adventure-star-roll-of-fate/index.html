<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
      .game-header { text-align: center; margin-bottom: 15px; max-width: 600px; }
    </style>
  </head>
  <body>
    <div class="game-header">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin: 0 0 8px 0;">Adventure Star: Roll of Fate</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Basic)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; margin: 8px auto; line-height: 1.3; font-size: 13px;">Navigate 9 levels to reach the exit. Defeat all enemies to unlock the exit and buy weapons from the shop.</p>
      <p id="gameControls" style="color: #aaa; font-family: Arial, sans-serif; margin: 5px auto 0 auto; line-height: 1.2; font-size: 11px;">Arrow Keys/WASD: Move | Space: Shoot | E: Interact | H: Heal (100 gold) | S: Shop | Enter: Start | Esc: Pause | R: Restart</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="enemy.js"></script>
    <script src="../../dev_mode.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Brick Breaker</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      h1 { text-shadow: 0 0 10px #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin-bottom: 10px;">Neon Brick Breaker</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Survival)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Gap Shot)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 14px;">
        Aim and fire balls to break descending neon bricks. Collect '+' items to increase your ball count. Don't let the bricks reach the bottom!
      </p>
      <p id="gameControls" style="color: #888; font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 12px;">
        ARROWS: Aim | SPACE: Fire | Z: Fast Forward | ESC: Pause | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@1.0.0/p5.collide2d.min.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // Update UI
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // Give focus back to canvas so keys work immediately
          document.querySelector('canvas').focus(); 
        }
      }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

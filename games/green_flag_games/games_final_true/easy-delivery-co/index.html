<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      
      /* Container ensures canvas and UI match perfectly */
      #game-container { 
        width: 600px; 
        height: 400px; 
        position: relative; 
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      
      canvas { display: block; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #ffcc00; color: #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN')">Play Mode</button>
      </div>
      
      <!-- Game Description -->
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Drive your kei truck to pick up and deliver packages in the foggy town of Oakhaven. Earn money, navigate the roads, and watch for strange occurrences in the mist.
      </p>

      <div style="color: #ccc; font-family: monospace; font-size: 12px; max-width: 600px; line-height: 1.4;">
        ARROWS: Drive | WASD: Camera | SPACE: Interact | C: Toggle View | SHIFT: Boost
      </div>
    </div>

    <!-- Game container is injected by game.js here to ensure order -->
    
    <script>
      window.controlMode = 'HUMAN';
      function setMode(mode) {
        window.controlMode = mode;
        if(window.getGameState) {
           window.getGameState().controlMode = mode;
        }
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
        
        // Focus game for keyboard
        const container = document.getElementById('game-container');
        if(container) container.focus();
      }
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

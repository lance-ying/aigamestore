<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SpongeBob: The Cosmic Shake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 600px;
            height: 400px;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: #000;
        }
        
        #game-container {
            width: 600px;
            height: 400px;
            position: relative;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        canvas {
            display: block;
            margin: 0;
            padding: 0;
        }
        
        .control-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
            position: absolute;
            top: -100px;
            left: 0;
            right: 0;
        }
        
        .control-button {
            padding: 8px 16px;
            cursor: pointer;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        
        .control-button.active {
            background: #007bff;
        }
        
        #game-info {
            position: absolute;
            top: -200px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
</head>
<body>
    <div id="game-info">
        <h2 style="margin-bottom: 10px;">SpongeBob: The Cosmic Shake</h2>
        <p style="font-size: 12px; line-height: 1.4; max-width: 600px; margin: 0 auto;">
            Navigate cosmic platforms in 3D, defeat enemies, and collect coins! Use WASD or Arrow Keys to move in all directions. Unlock abilities: Karate Kick (25 coins), Double Jump (50 coins), Hook-Swing (100 coins). Reach the portal to win!
        </p>
        <div class="control-buttons">
            <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
            <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST_1 (Movement)</button>
            <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST_2 (Win)</button>
        </div>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RADIATION CITY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 600px;
            height: 400px;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: #000;
        }
        
        #game-container {
            width: 600px;
            height: 400px;
            position: relative;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        canvas {
            display: block;
            margin: 0;
            padding: 0;
        }
        
        .control-buttons {
            position: absolute;
            top: -60px;
            left: 0;
            right: 0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 5px;
        }
        
        .control-button {
            padding: 6px 12px;
            cursor: pointer;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .control-button.active {
            background: #007bff;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
</head>
<body>
    <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST 3</button>
        <button id="test_4_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_4')">TEST 4</button>
        <button id="test_5_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_5')">TEST 5</button>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Courier New', Courier, monospace; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
      .control-button { 
        padding: 8px 16px; 
        cursor: pointer; 
        background: #333; 
        color: #fff; 
        border: 1px solid #555; 
        border-radius: 4px; 
        font-family: inherit;
        transition: background 0.2s;
      }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; }
      p { max-width: 600px; text-align: center; line-height: 1.5; font-size: 14px; margin-bottom: 10px; }
      .controls { color: #aaa; font-size: 12px; margin-top: 5px; }
    </style>
  </head>
  <body>
    
    <div class="control-buttons">
      <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
    </div>

    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- We don't strictly need collide2d for grid based, but including as per instructions -->
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if(window.setControlMode) window.setControlMode(mode);
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Reset focus to canvas so keys work immediately
        document.querySelector('body').focus();
      }
    </script>
    
    <p class="controls">
      ARROWS: Move/Attack | SPACE: Skip Beat | ENTER: Start | ESC: Pause | R: Restart
    </p>
  </body>
</html>

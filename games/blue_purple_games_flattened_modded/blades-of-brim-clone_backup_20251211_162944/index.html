<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          width: 100%;
          height: 100%;
          overflow: hidden; 
          background: #222; 
          font-family: Arial, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          align-items: center; 
          justify-content: center;
      }
      #game-container {
          position: relative;
          width: 600px;
          height: 400px;
          background: #000;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          flex-shrink: 0;
      }
      canvas { display: block; }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin: 10px 0; 
          z-index: 100;
          width: 100%;
          justify-content: center;
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #666; 
          border-radius: 4px; 
          font-size: 12px;
      }
      .control-button:hover { background: #555; }
      .control-button:active { background: #007bff; }
    </style>
  </head>
  <body>
    <div id="game-container">
        <!-- Game Canvas and UI Overlay will be injected here -->
    </div>
    
    <div class="control-buttons">
        <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Survival)</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Combat)</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

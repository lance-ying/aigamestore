<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #222; 
          font-family: 'Courier New', Courier, monospace;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          position: relative;
          width: 600px;
          height: 400px;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { 
          display: block;
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          font-family: inherit;
          transition: background 0.2s;
      }
      .control-button:hover {
          background: #555;
      }
      .control-button.active { 
          background: #007bff; 
          border-color: #0056b3;
      }
      h1 {
          color: #fff;
          text-shadow: 2px 2px #000;
          margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
      </div>
      <p style="color: #aaa; font-size: 14px; margin-bottom: 5px;">
        Use Arrow Keys to Tilt | Space to Charge Jump
      </p>
    </div>
    
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                // Update UI
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Focus game container so keys work immediately
                window.focus();
            }
        }
    </script>
  </body>
</html>

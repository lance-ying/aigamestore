<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure canvas is exactly 600x400 and no border interference */
      #game-container { 
        width: 600px !important; 
        height: 400px !important; 
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
      }
      canvas { display: block; }
      
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 15px; 
          flex-wrap: wrap; 
          justify-content: center;
          position: relative;
          z-index: 1001;
      }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: none; 
          border-radius: 4px; 
          font-family: Arial, sans-serif;
          font-weight: bold;
          transition: background 0.2s;
      }
      .control-button:hover { background: #555; }
      .control-button.active { background: #00ffff; color: #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px; color: #333; font-family: Arial, sans-serif;">
        <!-- Removed h2 with game name -->
        <div class="control-buttons">
            <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
            <button id="test1Btn" class="control-button" onclick="setMode('TEST_1', this)">Test Jump</button>
            <button id="test2Btn" class="control-button" onclick="setMode('TEST_2', this)">Test Play</button>
        </div>
        <p style="font-size: 12px; color: #666;">Space to Jump | Arrows/WASD to Move | R to Restart</p>
    </div>

    <!-- Script to load libraries and game -->
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                // Update UI
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Focus game container so keyboard works immediately
                document.getElementById('game-container')?.focus();
            }
        }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #game-container { 
          width: 600px !important; 
          height: 400px !important; 
          position: relative; 
          overflow: hidden; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { width: 100%; height: 100%; display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <!-- Removed game title h1 -->
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST (Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST (Win)</button>
      </div>
      <!-- Removed game description p -->
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        ARROWS/WASD: Tilt Stage | SPACE: Brake | R: Restart | ESC: Pause | ENTER: Start
      </p>
    </div>
    
    <!-- Game Container created by script, but we can put a placeholder -->
    <div id="game-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    
    <script>
        function setMode(mode, btn) {
            if(window.setControlMode) window.setControlMode(mode);
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

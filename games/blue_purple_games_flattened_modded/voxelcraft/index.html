<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      
      /* Container ensures proper sizing and overflow handling for iframe */
      #game-container {
          position: relative;
          width: 600px;
          height: 400px;
          overflow: hidden;
          background: #000;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      
      canvas { display: block; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.getGameState().controlMode='HUMAN'">Human Mode</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: monospace; max-width: 600px; margin: 0 auto 10px auto; font-size: 12px;">
        Use WASD to Move, ARROWS to Look. Z to Place, SHIFT to Cycle Tool.
      </p>
    </div>
    
    <!-- Game Container -->
    <div id="game-container"></div>
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
</body>
</html>

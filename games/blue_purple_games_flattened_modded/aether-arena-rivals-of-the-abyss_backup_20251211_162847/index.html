<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
      .control-button { padding: 8px 20px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button:active { background: #666; }
      h1 { margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      p { max-width: 600px; text-align: center; line-height: 1.5; font-size: 14px; color: #aaa; margin-bottom: 5px; }
    </style>
  </head>
  <body>
    
    <div class="control-buttons">
      <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
      <button class="control-button" onclick="window.setControlMode('TEST_1')">Test: Survival</button>
      <button class="control-button" onclick="window.setControlMode('TEST_2')">Test: Combat</button>
    </div>

    <p id="gameControls">
      Arrows: Move | Space: Jump | Z: Attack | Shift: Special | ESC: Pause | R: Restart
    </p>

    <!-- p5.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- p5.collide2D Library -->
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
  </body>
</html>

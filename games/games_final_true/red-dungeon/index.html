<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d32f2f; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 14px;">
        Trapped in an endless, shifting dungeon, escape the closing 'Wall of Doom'. Navigate the grid, avoid traps, and collect gold for points.
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 10px auto; font-size: 12px;">
        Controls: Arrows to Move, Space to Wait, ESC to Pause, R to Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      window.setControlMode = function(mode) {
        const gameState = window.getGameState();
        if (gameState) {
            gameState.controlMode = mode;
            // Update UI buttons
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if(mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            
            // Restart is not directly handled here, as only one mode remains.
            // Game restart is handled by 'R' key.
        }
      };
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

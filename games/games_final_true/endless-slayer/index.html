<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d32f2f; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-shadow: 2px 2px #000;">press enter to begin</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="setMode('TEST_1', this)">TEST: Knight Survival</button>
        <button id="test2Btn" class="control-button" onclick="setMode('TEST_2', this)">TEST: Wizard Aggro</button>
        <button id="test3Btn" class="control-button" onclick="setMode('TEST_3', this)">TEST: Knave Dash</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: monospace; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Slay endless waves of monsters in this fast-paced action RPG. Choose your hero, level up, and survive as long as you can!
      </p>
      <p style="color: #888; font-family: monospace; font-size: 12px;">
        ARROWS: Move | Z: Attack | SPACE: Jump | ENTER: Start | ESC: Pause
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // Focus canvas
          setTimeout(() => {
             const canvas = document.querySelector('canvas');
             if(canvas) canvas.focus();
          }, 100);
        }
      }
    </script>
  </body>
</html>

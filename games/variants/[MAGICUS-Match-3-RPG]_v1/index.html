<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #3498db; }
      
      /* Instructions Styles */
      /* The .instructions class is no longer used for gameDescription but kept for consistency if other elements might use it */
      .instructions {
        background: #222;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 12px 20px;
        max-width: 600px;
        margin: 0 auto 15px auto;
        text-align: left;
        font-family: 'Verdana', sans-serif;
        font-size: 13px;
        color: #ccc;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      .instructions h2 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #ffd700;
        text-transform: uppercase;
        text-align: center;
        letter-spacing: 1px;
      }
      .instructions ul {
        margin: 0;
        padding-left: 20px;
        list-style-type: square;
      }
      .instructions li {
        margin-bottom: 4px;
        line-height: 1.4;
      }
      .key {
        color: #fff;
        background: #444;
        padding: 1px 5px;
        border-radius: 3px;
        font-family: monospace;
        font-weight: bold;
        border: 1px solid #555;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <!-- Removed h1 with game title -->
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode(this)">Human Mode</button>
      </div>
      
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        A strategic Match-3 RPG. Match elemental runes to cast spells, battle monsters, and progress through stages. Clear all stages to win, but watch your HP!
      </p>
      <p id="gameControls" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        Arrow Keys: Move cursor | Z: Select/Confirm swap | Space: Cast Ultimate | Shift: View Rune info (hold) | ESC: Pause | ENTER: Start | R: Restart
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    <script type="module" src="game.js"></script>
    <script>
      // Simplified setMode as only Human mode remains. Primarily for active class and canvas focus.
      function setMode(btn) {
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Focus canvas to ensure keyboard input works immediately
        document.querySelector('canvas').focus();
      }
    </script>
  </body>
</html>

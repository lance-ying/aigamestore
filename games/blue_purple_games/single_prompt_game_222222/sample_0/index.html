<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Stickman Fury</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { 
          padding: 8px 16px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          font-weight: bold;
          transition: background 0.2s;
      }
      .control-button:hover { background: #555; }
      .control-button:active { background: #333; }
      
      h1 { color: #f0f0f0; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 24px; }
      p { color: #aaa; font-size: 14px; max-width: 600px; text-align: center; margin: 5px 0; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Stickman Fury</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Basic)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Perfect)</button>
      </div>
      <p id="gameDescription">
        Rhythm-based brawler. Enemies approach from Left and Right. <br>
        Wait for them to reach the markers and strike!
      </p>
      <p id="gameControls" style="color: #4da6ff;">
        Controls: LEFT/RIGHT Arrows to Attack | SPACE for Fury | ESC to Pause
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

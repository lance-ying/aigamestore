<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jelly Shift 3D</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          width: 100%;
          height: 100%;
          overflow: hidden; 
          background: #222; 
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      #game-container {
          width: 600px;
          height: 400px;
          position: relative;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      .control-buttons { 
          display: none; /* Hidden by default as per constraints generally, but useful for testing if overlay allowed. We keep it hidden to stick to canvas only */
      }
    </style>
  </head>
  <body>
    <!-- Game Container created by script -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <!-- Optional Debug Controls for Manual Testing (hidden in prod) -->
    <div style="position: fixed; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 5px; opacity: 0.5;">
        <button onclick="window.setControlMode('HUMAN')">Human</button>
        <button onclick="window.setControlMode('TEST_2')">Auto Play</button>
    </div>
  </body>
</html>

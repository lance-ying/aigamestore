<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MAGICUS - Match-3 RPG</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #3498db; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #ffd700; font-family: 'Verdana', sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">MAGICUS</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Basic)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Win)</button>
      </div>
      <p id="gameDescription" style="color: #aaa; font-family: 'Verdana', sans-serif; font-size: 14px; max-width: 600px; margin: 0 auto 10px auto;">
        Match runes to cast spells and defeat monsters!
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    <script type="module" src="game.js"></script>
    <script type="module" src="automated_testing_controller.js"></script>
    <script>
      function setMode(mode, btn) {
        if(window.setControlMode) {
          window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // Focus canvas
          document.querySelector('canvas').focus();
        }
      }
    </script>
  </body>
</html>

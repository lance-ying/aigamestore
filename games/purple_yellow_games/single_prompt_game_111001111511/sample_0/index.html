<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Stack - Three.js Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure container has exact size and clips overflow */
      #game-container { 
        width: 600px; 
        height: 400px; 
        position: relative; 
        overflow: hidden; 
        background: #000;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      
      /* UI Text styling helper */
      .game-text {
          font-family: 'Arial', sans-serif;
          color: #fff;
          margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" class="game-text">Stack 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST: Basic</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST: Perfect</button>
        <button id="test3ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">TEST: Fail</button>
      </div>
      <p id="gameDescription" class="game-text" style="max-width: 600px; color: #ccc;">
        Stack the blocks as high as you can! Press SPACE to place the block. Align it perfectly to keep the tower wide.
      </p>
    </div>
    
    <!-- Game Container acts as the boundary for the game canvas and UI -->
    <div id="game-container"></div>
    
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) window.setControlMode(mode);
            
            // Update UI buttons
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Ensure focus returns to game if needed, though keyboard listeners are on window
            document.activeElement.blur();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

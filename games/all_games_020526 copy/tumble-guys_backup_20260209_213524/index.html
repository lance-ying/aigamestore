<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Container ensures canvas and UI stay together */
      #game-container { position: relative; width: 600px; height: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      canvas { display: block; width: 100% !important; height: 100% !important; }
      /* UI overlay canvas should maintain exact pixel dimensions */
      canvas.ui-overlay { width: 600px !important; height: 400px !important; }
      
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #00AAFF; }
      
      h1 { text-shadow: 2px 2px 0 #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <!-- Removed h1 id="gameTitle" -->
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); updateActiveBtn(this);">Human Mode</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        A chaotic 3D obstacle course battle royale. Race as a colorful bean, navigating hazards to reach the finish line and claim your crown before qualification spots fill up!
      </p>
      <p id="gameControls" style="color: #888; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4;">
        WASD: Move | SPACE: Jump | SHIFT: Dive | ENTER: Start | ESC: Pause | R: Restart
      </p>
    </div>
    
    <!-- Game Container created by script, or we define it here -->
    <div id="game-container"></div>

    <script>
      function updateActiveBtn(clickedBtn) {
        document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
        clickedBtn.classList.add('active');
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN')">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setControlMode('TEST_1')">TEST (Connection)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setControlMode('TEST_2')">TEST (AutoPlay)</button>
      </div>
      
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Design a transit map for a growing city. Connect stations with colored lines to transport passengers. Avoid overcrowding stations to keep the city moving.
      </p>
      <p id="gameControls" style="color: #aaa; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 12px;">
        <strong>Arrows</strong>: Move Cursor | <strong>Z</strong>: Switch Line | <strong>Space</strong>: Connect/Build | <strong>Shift+Space</strong>: Undo | <strong>ESC</strong>: Pause
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script type="module">
        import { gameState } from './globals.js';
        
        window.setControlMode = function(mode) {
            if (!gameState) return;
            gameState.controlMode = mode;
            
            // Update UI
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if (mode === 'TEST_1') document.getElementById('test1ModeBtn').classList.add('active');
            if (mode === 'TEST_2') document.getElementById('test2ModeBtn').classList.add('active');
            
            // Focus canvas
            document.querySelector('canvas').focus();
        };
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>

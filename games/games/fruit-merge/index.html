<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fruit Merge - Match & Merge Game</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #444; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
      #gameInfo { text-align: center; margin-bottom: 15px; }
      h1 { color: #FFB6C1; margin: 0 0 8px 0; font-size: 32px; font-weight: 600; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
      p { color: #b0b0b0; font-size: 13px; margin: 4px 0; max-width: 600px; line-height: 1.5; }
      .controls { font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <div id="gameInfo">
      <h1>Fruit Merge</h1>
      <p>Drop and merge matching fruits to create bigger ones. Reach the watermelon to win!</p>
      <p class="controls">Controls: TAP ← → or A/D to move | TAP ↓ or S to drop | TAP SPACE for quick drop | ESC to pause</p>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script src="../../dev_mode.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Deep Shaft Down</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #game-container {
        position: relative;
        width: 600px;
        height: 400px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px;">Deep Shaft Down</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Move)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Hover)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST 3 (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 5px auto; font-size: 14px;">
        Plunge into the abyss. Shoot Gunboots to slow fall.
      </p>
      <p id="gameControls" style="color: #888; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        Arrows/WASD: Move | Space: Jump | Z/Shift: Shoot | Enter: Start | R: Restart
      </p>
    </div>
    
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

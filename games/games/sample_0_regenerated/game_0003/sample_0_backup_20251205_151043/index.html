<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Spelunker Moon</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-family: inherit; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #0066cc; border-color: #0088ff; }
      h1 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Spelunker Moon</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST (Stress)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST (Auto-Win)</button>
      </div>
      <p id="gameDescription" style="max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; color: #aaa;">
        Explore the procedural moon caves. Find the exit portal. Don't die.
      </p>
      <p id="gameControls" style="max-width: 600px; margin: 0 auto 20px auto; font-size: 0.9em; color: #888;">
        Controls: Arrows to Move • Space to Jump • Shift to Run • Z to Attack • R to Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      // Global control mode switcher
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if (state) {
            state.controlMode = mode;
            console.log("Control Mode set to:", mode);
            
            // UI Update
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
            if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
            
            // Auto start if testing
            if (mode !== 'HUMAN' && state.gamePhase === "START") {
                state.gamePhase = "PLAYING";
            }
        }
      };
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

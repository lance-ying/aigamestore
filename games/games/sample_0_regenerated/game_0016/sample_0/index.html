<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Aether Rivals: Elemental Duel</title>
    <style>
      html, body { 
          margin: 0; 
          padding: 0; 
          height: 100%; 
          overflow: hidden; 
          background: #1e1e24; 
          color: #fff;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      body { 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
      }
      canvas { 
          border: 4px solid #333; 
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          border-radius: 4px;
      }
      .container {
          text-align: center;
          margin-bottom: 20px;
      }
      .control-buttons { 
          display: flex; 
          gap: 10px; 
          margin-bottom: 20px; 
          flex-wrap: wrap; 
          justify-content: center; 
      }
      .control-button { 
          padding: 8px 20px; 
          cursor: pointer; 
          background: #444; 
          color: #fff; 
          border: 1px solid #555; 
          border-radius: 4px; 
          font-weight: bold;
          transition: background 0.2s;
      }
      .control-button:hover { background: #555; }
      .control-button:active { background: #333; }
      h1 { margin: 0 0 10px 0; letter-spacing: 2px; text-transform: uppercase; }
      .desc { color: #aaa; max-width: 600px; margin: 0 auto 15px auto; line-height: 1.5; font-size: 14px; }
      .controls { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Aether Rivals</h1>
      <p class="desc">
        Elemental Duel: Battle your opponent and knock them off the stage! 
        Higher damage % means further knockback.
      </p>
      
      <div class="control-buttons">
        <button class="control-button" onclick="window.setControlMode('HUMAN')">Play Human</button>
        <button class="control-button" onclick="window.setControlMode('TEST_1')">Test Movement</button>
        <button class="control-button" onclick="window.setControlMode('TEST_2')">Test Attack</button>
        <button class="control-button" onclick="window.setControlMode('TEST_3')">Test AI Combat</button>
      </div>
    </div>

    <!-- p5.js and Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <div class="controls">
        ARROWS: Move & Aim | SPACE: Jump | Z: Attack | SHIFT: Special | ENTER: Start | R: Restart
    </div>
  </body>
</html>

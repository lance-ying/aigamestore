<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Crumble Chaos</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #game-container {
        width: 600px;
        height: 400px;
        position: relative;
        overflow: hidden;
        border: 2px solid #333;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      canvas { display: block; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: sans-serif; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button:active { background: #007bff; }
      h1 { color: #fff; font-family: Arial, sans-serif; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      p { color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Crumble Chaos</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST: Movement</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST: Jump</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST: Crumble</button>
        <button id="test_5_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_5')">TEST: Death</button>
      </div>
      <p>Control a blue slime ball through a crumbling world. Platforms fall when you touch them!</p>
      <p>ARROWS/WASD: Move | SPACE: Jump | Z/SHIFT: Grapple Hook</p>
    </div>
    
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

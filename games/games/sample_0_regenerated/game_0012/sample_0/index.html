<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Summit Ascent</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
      canvas { border: 2px solid #444; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #d32f2f; border-color: #f44336; }
      h1 { color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 0 #d32f2f; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">SUMMIT ASCENT</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setControlMode('HUMAN'); setActive(this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setControlMode('TEST_1'); setActive(this)">TEST (Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setControlMode('TEST_2'); setActive(this)">TEST (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Ascend the treacherous Summit. Master jumping, wall-climbing, and dashing to navigate hazards.
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        Arrows: Move | Space: Jump | Z: Dash | Shift: Climb | Enter: Start | R: Restart
      </p>
    </div>
    
    <script>
        function setActive(btn) {
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Focus canvas after click to ensure keyboard works
            setTimeout(() => document.querySelector('canvas').focus(), 100);
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

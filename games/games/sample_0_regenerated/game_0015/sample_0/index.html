<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Zenonia 4 Demake</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 600px !important; height: 400px !important; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #444; color: #fff; }
      .control-button.active { background: #d32f2f; color: #fff; border-color: #f44336; }
      
      h1 { color: #eee; margin-bottom: 5px; text-shadow: 2px 2px 0 #000; }
      p { color: #888; font-size: 14px; margin: 5px 0; max-width: 600px; text-align: center; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 10px;">
      <h1>ZENONIA 4 DEMAKE</h1>
      <p>Return of the Legend - Action RPG</p>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Test: Movement</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Test: Combat AI</button>
      </div>
    </div>
    
    <!-- Canvas injected here by p5 -->
    
    <div style="margin-top: 10px; text-align: center;">
      <p style="color: #666; font-size: 12px;">Controls: Arrows to Move, SPACE to Attack, Z for Skill, SHIFT to Dash</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          
          // Update UI
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // Focus canvas
          setTimeout(() => {
             const canvas = document.querySelector('canvas');
             if(canvas) canvas.focus();
          }, 100);
        }
      }
    </script>
  </body>
</html>

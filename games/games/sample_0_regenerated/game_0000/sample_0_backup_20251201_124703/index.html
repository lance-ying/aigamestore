<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #007bff; }
      #gameDescription { text-align: center; }
    </style>
    <script>
      window.setControlMode = function(mode) {
        const state = window.getGameState();
        if (state) {
            state.controlMode = mode;
            console.log("Control Mode set to:", mode);
            
            // Update buttons
            document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
            if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
            if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
            if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
            if (mode === 'TEST_3') document.getElementById('test_3_ModeBtn').classList.add('active');
        }
      };
    </script>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Super Plumber Run</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Stomp)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST 3 (Complete)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Run, jump, and stomp your way to the castle! Avoid gaps and enemies.
      </p>
      <p id="gameControls" style="color: #888; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto;">
        [SPACE]: Jump | [DOWN]: Fast Fall | [ENTER]: Start | [R]: Restart
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

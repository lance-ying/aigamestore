<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jelly Shifter 3D</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      /* Ensure game container is strict size */
      #game-container-wrapper { width: 600px; height: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #00ffcc; color: #000; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 style="color: #00ffcc; font-family: Arial, sans-serif; margin-bottom: 10px; text-shadow: 0 0 10px #00ffcc;">JELLY SHIFTER 3D</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Random)</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (AI Solver)</button>
      </div>
      <p style="color: #ccc; font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto 5px auto; font-size: 14px;">
        Shift your shape to slide through obstacles!
      </p>
    </div>
    
    <!-- Game attaches here -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // UI update
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // Focus canvas if possible
          document.body.focus();
        }
      }
    </script>
  </body>
</html>

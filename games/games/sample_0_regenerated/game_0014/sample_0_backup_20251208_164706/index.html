<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Risk of Rain JS</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-family: monospace; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button:active { background: #333; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', sans-serif; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Risk of Rain JS</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1: Survival</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2: Objective</button>
      </div>
      <p id="gameDescription" style="color: #aaa; font-family: monospace; max-width: 600px; margin: 0 auto 10px auto; font-size: 12px;">
        Survive the alien planet. Time increases difficulty. Find the Teleporter.
      </p>
      <p id="gameControls" style="color: #888; font-family: monospace; max-width: 600px; margin: 0 auto 20px auto; font-size: 11px;">
        ARROWS: Move/Interact | SPACE: Jump | Z: Shoot | SHIFT: Dodge
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Moon Spelunker</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .container { text-align: center; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { 
        padding: 8px 20px; 
        cursor: pointer; 
        background: #333; 
        color: #fff; 
        border: 1px solid #555; 
        border-radius: 4px; 
        font-weight: bold;
        transition: background 0.2s;
      }
      .control-button:hover { background: #444; }
      .control-button:active { background: #555; transform: translateY(1px); }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="gameTitle" style="margin-bottom: 10px;">Moon Spelunker</h1>
      
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST 1 (Survival)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST 2 (Auto-Play)</button>
      </div>

      <div id="gameContainer"></div>
      
      <p id="gameDescription" style="max-width: 600px; margin: 15px auto; color: #aaa; font-size: 14px;">
        Descend into the procedural lunar depths. Find the exit while collecting gold and avoiding dangerous fauna.
      </p>
      <p id="gameControls" style="max-width: 600px; margin: 0 auto; color: #888; font-size: 13px;">
        Controls: Arrows to Move • Space to Jump • Z to Whip • Shift to Sprint • R to Restart
      </p>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

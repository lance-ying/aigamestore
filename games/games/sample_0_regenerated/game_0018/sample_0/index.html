<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BRO-OP MISSION: FREEDOM</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; }
      canvas { border: 4px solid #444; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #d00; color: white; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px #000;">BRO-OP MISSION: FREEDOM</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1Btn" class="control-button" onclick="setMode('TEST_1', this)">TEST: Mobility</button>
        <button id="test2Btn" class="control-button" onclick="setMode('TEST_2', this)">TEST: Win Attempt</button>
        <button id="test3Btn" class="control-button" onclick="setMode('TEST_3', this)">TEST: Stress</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Run, gun, and explode everything in your path. Liberate the level from evil forces.
      </p>
      <p id="gameControls" style="color: #aaa; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.4; font-size: 12px;">
        ARROWS: Move/Aim | Z: Shoot | SHIFT: Grenade | SPACE: Jump | ENTER: Start | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) window.setControlMode(mode);
        
        // Update UI
        document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Focus canvas so keys work immediately
        setTimeout(() => document.querySelector('canvas').focus(), 100);
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

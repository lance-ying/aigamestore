<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Lunar Spelunker</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #555; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #e91e63; font-weight: bold; }
      
      .info-panel {
          width: 600px;
          color: #ccc;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          margin-bottom: 20px;
          text-align: center;
      }
      h1 { color: #ffeb3b; margin: 0 0 10px 0; text-shadow: 2px 2px 0 #000; }
    </style>
    
    <script>
        window.setControlMode = function(mode) {
            const gameState = window.getGameState();
            if (gameState) {
                gameState.controlMode = mode;
                console.log("Control Mode set to:", mode);
                
                // Update UI buttons
                document.querySelectorAll('.control-button').forEach(btn => btn.classList.remove('active'));
                if (mode === 'HUMAN') document.getElementById('humanModeBtn').classList.add('active');
                if (mode === 'TEST_1') document.getElementById('test_1_ModeBtn').classList.add('active');
                if (mode === 'TEST_2') document.getElementById('test_2_ModeBtn').classList.add('active');
                if (mode === 'TEST_3') document.getElementById('test_3_ModeBtn').classList.add('active');
            }
        };
    </script>
  </head>
  <body>
    <div class="info-panel">
      <h1 id="gameTitle">Lunar Spelunker</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN')">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1')">TEST: Movement</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2')">TEST: Collisions</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_3')">TEST: Attacks</button>
      </div>
      <p id="gameDescription" style="font-size: 14px; line-height: 1.4;">
        Explore the procedurally generated depths of the Moon. Collect gold, whip enemies, and find the exit before you perish!
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

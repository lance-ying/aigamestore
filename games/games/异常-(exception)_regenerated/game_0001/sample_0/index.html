<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>EXCEPTION; - Robot Programming Puzzle</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #eee; font-family: 'Courier New', monospace; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
      h1 { text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); letter-spacing: 2px; margin-bottom: 5px; }
      .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div style="text-align: center;">
      <h1 id="gameTitle">EXCEPTION;</h1>
      <p class="subtitle">RUNTIME_ENVIRONMENT_V1.0</p>
      
      <p id="gameDescription" style="display:none;">
        Program the robot unit to reach the extraction point. Avoid obstacles and neutralize threats.
      </p>
    </div>

    <!-- p5.js Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>

</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>EXCEPTION - AI Programming Puzzle</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
      canvas { border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 255, 200, 0.1); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #aaa; border: 1px solid #444; border-radius: 4px; font-family: inherit; transition: all 0.2s; }
      .control-button:hover { background: #444; color: #fff; border-color: #666; }
      .control-button.active { background: #007bff; color: white; border-color: #0056b3; }
      h1 { color: #eee; margin: 0 0 10px 0; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
      .description { color: #888; max-width: 600px; text-align: center; margin-bottom: 20px; font-size: 14px; line-height: 1.4; }
      .controls { color: #666; font-size: 12px; margin-bottom: 10px; text-align: center; }
    </style>
  </head>
  <body>
    <div>
      <h1 id="gameTitle">EXCEPTION</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="window.setControlMode('HUMAN'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_1'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">TEST 1 (Move)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="window.setControlMode('TEST_2'); document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active')); this.classList.add('active');">TEST 2 (Win)</button>
      </div>
      <p class="description">
        Program your units to navigate the corrupted grid. Plan your moves, avoid hazards, and clear anomalies. 
        Sequence your commands carefully, then run the simulation.
      </p>
      <p class="controls">
        ARROWS: Edit Commands | SHIFT: Switch Unit | Z: Run/Stop | SPACE: Clear Slot | R: Restart | ENTER: Start
      </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Module Loading -->
    <script type="module" src="globals.js"></script>
    <script type="module" src="entities.js"></script>
    <script type="module" src="levels.js"></script>
    <script type="module" src="logic.js"></script>
    <script type="module" src="ui.js"></script>
    <script type="module" src="input.js"></script>
    <script type="module" src="test_controller.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>

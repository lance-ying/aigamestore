<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Leo's Fortune - p5.js</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
      .control-button { 
        padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s;
      }
      .control-button:hover { background: #444; }
      .control-button:active { background: #222; }
      h1 { color: #64e0d0; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      .description { color: #aaa; max-width: 600px; text-align: center; margin-bottom: 20px; line-height: 1.5; font-size: 14px; }
      .controls { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h1>Leo's Fortune</h1>
    
    <div class="control-buttons">
      <button class="control-button" onclick="window.setControlMode('HUMAN')">Human Mode</button>
      <button class="control-button" onclick="window.setControlMode('TEST_1')">Test 1 (Physics)</button>
      <button class="control-button" onclick="window.setControlMode('TEST_2')">Test 2 (Win)</button>
      <button class="control-button" onclick="window.setControlMode('TEST_3')">Test 3 (Lose)</button>
    </div>

    <div class="description">
      Navigate Leo through hazardous terrain to recover your gold! Use the arrow keys to roll, inflate to float over gaps, and deflate to dive or land precisely.
    </div>

    <!-- p5.js and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@1.0.0/p5.collide2d.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <div class="controls">
      Controls: Arrows to Move/Inflate/Deflate | ENTER to Start | ESC to Pause | R to Restart
    </div>
  </body>
</html>

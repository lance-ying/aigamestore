<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Gauntlet</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 1px solid #333; width: 600px !important; height: 400px !important; image-rendering: pixelated; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; }
      .control-button.active { background: #007bff; }
      .control-button:hover { background: #555; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px;">Pixel Gauntlet</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">TEST 1 (Movement)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">TEST 2 (Combat)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: sans-serif; max-width: 600px; margin: 0 auto 10px auto; font-size: 14px;">
        Battle through 5 levels of pixelated enemies. Defeat the Slimes, Bats, and Knights to reach the Overlord!
      </p>
      <p id="gameControls" style="color: #888; font-family: sans-serif; max-width: 600px; margin: 0 auto 20px auto; font-size: 12px;">
        ARROWS: Move/Jump | Z/SHIFT: Attack | ENTER: Start | ESC: Pause | R: Restart
      </p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          // UI update
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }
    </script>
    
    <script type="module" src="game.js"></script>
  </body>
</html>

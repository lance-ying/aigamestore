<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jump King Legend</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      canvas { border: 2px solid #555; width: 600px !important; height: 400px !important; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s; }
      .control-button:hover { background: #555; }
      .control-button.active { background: #dda520; color: #000; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle" style="color: #fff; font-family: 'Courier New', monospace; margin-bottom: 10px; text-shadow: 2px 2px #000;">JUMP KING LEGEND</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="updateMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="updateMode('TEST_1', this)">TEST (Jump Check)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="updateMode('TEST_2', this)">TEST (Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; font-family: sans-serif; max-width: 600px; margin: 0 auto 10px auto; line-height: 1.4; font-size: 14px;">
        Charge your jumps. Reach the top. Do not fall. <br>
        <span style="color: #dda520">Warning: No air control allowed.</span>
      </p>
      <p id="gameControls" style="color: #888; font-family: monospace; font-size: 12px;">
        ARROWS: Move | SPACE: Charge Jump | R: Restart | ESC: Pause
      </p>
    </div>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/p5.collide2d@0.7.3/p5.collide2d.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <script>
        function updateMode(mode, btn) {
            window.setControlMode(mode);
            document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
  </body>
</html>

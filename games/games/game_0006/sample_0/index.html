<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Leo's Odyssey</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a2e; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 4px; transition: all 0.2s; }
      .control-button:hover { background: #0f3460; }
      .control-button.active { background: #e94560; border-color: #e94560; }
      h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; color: #e94560; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Leo's Odyssey</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test_1_ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Test 1 (Move)</button>
        <button id="test_2_ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Test 2 (Float)</button>
        <button id="test_3_ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">Test 3 (AI Win)</button>
      </div>
      <p id="gameDescription" style="color: #ccc; max-width: 600px; margin: 0 auto 10px auto; font-size: 0.9em;">
        Navigate Leo through puzzles using physics. Collect all coins to exit.
      </p>
      <p id="gameControls" style="color: #888; max-width: 600px; margin: 0 auto 20px auto; font-size: 0.8em;">
        Controls: Arrows to Move • SPACE to Float • DOWN to Dive • R to Restart
      </p>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d@0.7.3/p5.collide2d.min.js"></script>
    
    <!-- Game Module -->
    <script type="module" src="game.js"></script>
    
    <!-- Helper Script for UI -->
    <script>
        function setMode(mode, btn) {
            if (window.setControlMode) {
                window.setControlMode(mode);
                document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
  </body>
</html>

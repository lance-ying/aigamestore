<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Leo's Fortune Clone</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      canvas { border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
      .control-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
      .control-button { padding: 8px 16px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; }
      .control-button:hover { background: #444; }
      .control-button.active { background: #007bff; border-color: #0056b3; }
      h1 { color: #fff; margin-bottom: 10px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
      p { color: #aaa; max-width: 600px; text-align: center; margin: 5px 0; font-size: 14px; }
    </style>
  </head>
  <body>
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 id="gameTitle">Leo's Fortune: Web Edition</h1>
      <div class="control-buttons">
        <button id="humanModeBtn" class="control-button active" onclick="setMode('HUMAN', this)">Human Mode</button>
        <button id="test1ModeBtn" class="control-button" onclick="setMode('TEST_1', this)">Test: Movement</button>
        <button id="test2ModeBtn" class="control-button" onclick="setMode('TEST_2', this)">Test: Physics</button>
        <button id="test3ModeBtn" class="control-button" onclick="setMode('TEST_3', this)">Test: Auto Win</button>
      </div>
      <p>Arrow Keys: Move & Inflate | Space: Jump | Shift: Sprint</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- We use the module version of p5.collide2d or load it globally. 
         Since hard constraints allowed p5.collide2D, we load it as global script here for simplicity with ES6 modules accessing window variables if needed, 
         but the code uses imports for cleaner structure where possible or relies on p5 instance methods. 
         Actually, the import in physics.js handles it. -->
    
    <script>
      function setMode(mode, btn) {
        if (window.setControlMode) {
          window.setControlMode(mode);
          document.querySelectorAll('.control-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }
    </script>
    <script type="module" src="game.js"></script>
  </body>
</html>
